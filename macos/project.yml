name: Lopi
options:
  bundleIdPrefix: ai.konjo.lopi
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.4.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

# iOS-Research-1 spike: the pure Stacks domain layer, extracted to
# `packages/LopiStacksKit` so a future iOS target can depend on it too — see
# `docs/ops/IOS_RESEARCH_1_SPIKE.md`. Local (path) package, not a remote one.
packages:
  LopiStacksKit:
    path: ../packages/LopiStacksKit

targets:
  Lopi:
    type: application
    platform: macOS
    sources:
      - path: Lopi
    dependencies:
      - package: LopiStacksKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.konjo.lopi
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSHumanReadableCopyright: "Konjo AI"
    entitlements:
      path: Lopi/Lopi.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: false

  LopiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LopiTests
    dependencies:
      - target: Lopi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.konjo.lopi.tests

schemes:
  Lopi:
    build:
      targets:
        Lopi: all
    test:
      targets:
        - LopiTests
