name: Lopi
options:
  bundleIdPrefix: ai.konjo.lopi
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.4.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

# iOS-Research-1 spike: the pure Stacks domain layer, extracted to
# `packages/LopiStacksKit` so a future iOS target can depend on it too — see
# `docs/ops/IOS_RESEARCH_1_SPIKE.md`. Local (path) package, not a remote one.
packages:
  LopiStacksKit:
    path: ../packages/LopiStacksKit

targets:
  Lopi:
    type: application
    platform: macOS
    sources:
      - path: Lopi
    dependencies:
      - package: LopiStacksKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.konjo.lopi
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSHumanReadableCopyright: "Konjo AI"
    entitlements:
      path: Lopi/Lopi.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: false

  LopiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LopiTests
    dependencies:
      - target: Lopi
      - package: LopiStacksKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.konjo.lopi.tests

  # Stack-Chain-1 / Popover-Fix-1 — first XCUITest target in this repo
  # (logged as a one-way-door dependency addition, see `LEDGER.md`). Drives
  # the real built `Lopi.app` via the accessibility-based XCUITest harness —
  # a different mechanism from interactive computer-use screen control, so it
  # can run headlessly in CI without a granted screen-recording permission.
  LopiUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: LopiUITests
    dependencies:
      - target: Lopi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.konjo.lopi.uitests
        TEST_TARGET_NAME: Lopi

  # iOS port — shares Networking/Store/Theme/Stacks with the macOS `Lopi`
  # target (none of those directories import AppKit; confirmed by grep before
  # sharing them) plus the same LopiStacksKit package. `LopiIOS/` holds only
  # the iOS-specific entry point and screens; there is no macOS analogue for
  # MenuBarExtra/Settings scenes, so LopiIOSApp.swift is its own file rather
  # than a shared one with #if os() branches.
  LopiIOS:
    type: application
    platform: iOS
    sources:
      - path: LopiIOS
      - path: Lopi/Networking
      - path: Lopi/Store
      - path: Lopi/Theme
      - path: Lopi/Stacks
      - path: Lopi/Components
    dependencies:
      - package: LopiStacksKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.konjo.lopi.ios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSHumanReadableCopyright: "Konjo AI"
        TARGETED_DEVICE_FAMILY: "1" # iPhone only for the first pass; iPad later

schemes:
  Lopi:
    build:
      targets:
        Lopi: all
    test:
      targets:
        - LopiTests
        - LopiUITests
  LopiIOS:
    build:
      targets:
        LopiIOS: all
