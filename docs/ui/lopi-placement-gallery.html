<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>lopi · guardrails + evals placement gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#0b0e10;--panel:#0a0d0f;--card:#0e1214;--paper:#f5f5f5;
  --ice:#00d4ff;--ember:#ff4500;--flame:#ff9500;--jade:#00ff9d;--sun:#ffcc00;
  --rose:#ff2d78;--teal:#00ffd4;--violet:#b79bff;
  --mist:rgba(255,255,255,.05);--veil:rgba(255,255,255,.11);
  --dim:rgba(245,245,245,.46);--dim2:rgba(245,245,245,.28);
  --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060809;color:var(--paper);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh}
.top{padding:15px 20px;border-bottom:1px solid var(--mist);position:sticky;top:0;background:#060809;z-index:20}
.brand{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.brand b{color:var(--paper)}
.toggle{display:flex;flex-wrap:wrap;gap:5px}
.toggle span{padding:7px 11px;color:var(--dim);cursor:pointer;border:1px solid var(--veil);border-radius:6px;font-family:var(--mono);font-size:10.5px;transition:.14s}
.toggle span:hover{color:var(--paper)}
.toggle span.on{background:rgba(0,212,255,.12);color:var(--ice);border-color:rgba(0,212,255,.4)}
.stage{max-width:640px;margin:0 auto;padding:26px 18px 90px}
.vt{font-family:var(--sans);font-size:16px;font-weight:600;margin-bottom:4px}
.vt .tag{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ice);border:1px solid rgba(0,212,255,.35);border-radius:20px;padding:2px 9px;margin-left:8px;vertical-align:middle}
.vd{font-family:var(--mono);font-size:11px;color:var(--dim);line-height:1.65;margin-bottom:20px;max-width:560px}
.vd b{color:var(--paper)}

.frame{display:flex;gap:0}
.railcol{flex:0 0 auto}
.cardcol{flex:1;min-width:0}

/* card */
.pc{position:relative;background:var(--card);border:1px solid rgba(255,150,70,.55);border-radius:9px;padding:13px 14px}
.runtag{position:absolute;top:-10px;left:14px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--flame);background:var(--black);border:1px solid rgba(255,149,0,.5);border-radius:3px;padding:2px 8px;display:inline-flex;align-items:center;gap:5px;z-index:2}
.runtag::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--flame);box-shadow:0 0 5px var(--ember)}
.preset{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--flame);border:1px solid rgba(255,149,0,.4);border-radius:12px;padding:2px 8px;margin-bottom:9px}
.preset svg{width:10px;height:10px}
.spec{font-family:var(--mono);font-size:14px;line-height:1.5;margin-bottom:10px}
.spec .al{color:var(--teal)} .spec .md{color:var(--dim)}
.prog{display:flex;gap:4px;margin-bottom:11px}.prog i{width:20px;height:3px;border-radius:2px;background:var(--veil)}
.prog i.done{background:var(--jade)}.prog i.cur{background:var(--flame);box-shadow:0 0 5px var(--ember)}
.cardbar{display:flex;align-items:center;gap:6px;padding-top:10px;border-top:1px solid var(--mist)}
.ib{height:29px;min-width:29px;padding:0 7px;border-radius:6px;border:1px solid var(--veil);background:transparent;color:var(--dim2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;font-family:var(--mono);font-size:11px;transition:.14s}
.ib svg{width:14px;height:14px}
.ib.iter{border-color:rgba(255,149,0,.5);background:rgba(255,69,0,.09);color:var(--flame);font-weight:700}
.ib.guard.act{color:var(--sun);border-color:rgba(255,204,0,.5);background:rgba(255,204,0,.08)}
.ib.eval.act{color:var(--jade);border-color:rgba(0,255,157,.5);background:rgba(0,255,157,.08)}
.ib .cnt{font-size:9px;font-weight:700}
.ib.guard:hover{color:var(--sun)} .ib.eval:hover{color:var(--jade)}
.sp{flex:1}

/* one-line summaries */
.sumln{display:flex;align-items:center;gap:7px;margin-top:8px;font-family:var(--mono);font-size:9.5px;min-width:0}
.sumln .rl{display:inline-flex;align-items:center;gap:4px;letter-spacing:.08em;text-transform:uppercase;font-size:8px;flex:0 0 auto;width:52px}
.sumln .rl svg{width:11px;height:11px}
.sumln.guard .rl{color:var(--sun)} .sumln.eval .rl{color:var(--jade)}
.sumln .txt{color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.sumln.guard .txt b{color:var(--sun);font-weight:500}
.sumln.eval .txt .p{color:var(--jade)} .sumln.eval .txt .f{color:var(--rose)} .sumln.eval .txt .r{color:var(--flame)}

/* glyph row (asymmetric guards) */
.glyphrow{display:flex;align-items:center;gap:8px;margin-top:9px;font-family:var(--mono);font-size:9px;color:var(--dim2)}
.glyphrow .gi{display:inline-flex;align-items:center;gap:4px;color:var(--sun)}
.glyphrow .gi svg{width:11px;height:11px}
.glyphrow .sepdot{color:var(--veil)}

/* selector row */
.selrow{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap}
.sel{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--dim);border:1px solid var(--veil);border-radius:5px;padding:5px 9px}
.sel svg{width:12px;height:12px}
.sel.model svg{color:var(--ice)} .sel.effort svg{color:var(--ember)} .sel.repo svg{color:var(--sun)} .sel.auto svg{color:var(--violet)} .sel.guard svg{color:var(--sun)} .sel.guard{color:var(--sun);border-color:rgba(255,204,0,.3)}

/* connector / edge gate */
.connector{display:flex;flex-direction:column;align-items:center;margin:0 0 0 0}
.cline{width:2px;height:16px;background:linear-gradient(180deg,rgba(255,149,0,.6),rgba(0,255,157,.6))}
.egate{border:1px solid rgba(0,255,157,.4);background:rgba(0,255,157,.06);border-radius:20px;padding:4px 12px;font-family:var(--mono);font-size:9.5px;color:var(--jade);display:inline-flex;align-items:center;gap:7px;position:relative}
.egate svg{width:12px;height:12px}
.egate .f{color:var(--rose)} .egate .r{color:var(--flame)}
.egate.blocked{border-color:rgba(255,45,120,.5);background:rgba(255,45,120,.08);color:var(--rose)}
.gatecap{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim2);margin-top:5px}

/* side rail dashboard */
.rail{width:56px;background:var(--panel);border:1px solid var(--veil);border-right:none;border-radius:9px 0 0 9px;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:14px}
.rail .rlbl{font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim2);writing-mode:vertical-rl;transform:rotate(180deg)}
.gauge{display:flex;flex-direction:column;align-items:center;gap:5px}
.gauge svg.ico{width:14px;height:14px}
.gauge.guard svg.ico{color:var(--sun)} .gauge.eval svg.ico{color:var(--jade)}
.ring{position:relative;width:34px;height:34px}
.ring svg{width:34px;height:34px;transform:rotate(-90deg)}
.ring .v{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8.5px;color:var(--paper)}
.railcard{border-radius:0 9px 9px 0!important;border-left:none!important}
.evaldots{display:flex;flex-direction:column;gap:3px;align-items:center}
.evaldots i{width:6px;height:6px;border-radius:50%;background:var(--veil)}
.evaldots i.pass{background:var(--jade);box-shadow:0 0 4px var(--jade)}
.evaldots i.run{background:var(--flame);box-shadow:0 0 4px var(--ember);animation:pulse 1.5s infinite}
.evaldots i.fail{background:var(--rose);box-shadow:0 0 4px var(--rose)}

/* live output */
.output{background:#0c1417;border:1px solid rgba(0,212,255,.2);border-top:none;border-radius:0 0 9px 9px;margin-top:-1px;overflow:hidden}
.pc.fused{border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom-color:transparent}
.obar{display:flex;align-items:center;gap:8px;padding:7px 12px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid rgba(0,212,255,.08)}
.obar .live{display:flex;align-items:center;gap:6px;color:var(--ice)}
.obar .live i{width:5px;height:5px;border-radius:50%;background:var(--ice);box-shadow:0 0 5px var(--ice);animation:pulse 1.4s infinite}
.obar .evalpill{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:9px;border-radius:11px;padding:2px 8px;border:1px solid;text-transform:none;letter-spacing:0}
.obar .evalpill svg{width:10px;height:10px}
.obar .evalpill.run{color:var(--flame);border-color:rgba(255,149,0,.45);background:rgba(255,69,0,.07)}
.ostrip{padding:8px 12px;font-family:var(--mono);font-size:10.5px;color:var(--dim)}
.ostrip .k{color:var(--violet);font-style:normal}
/* evals-as-output-section */
.osec{border-top:1px solid rgba(0,212,255,.07)}
.osh{display:flex;align-items:center;gap:7px;padding:7px 12px;font-family:var(--mono);font-size:10px;color:var(--jade)}
.osh svg{width:12px;height:12px}
.osh .n{margin-left:auto;font-size:9px;color:var(--dim2)}
.oevals{padding:2px 12px 10px 12px;display:flex;flex-direction:column;gap:5px}
.oev{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px}
.oev .d{width:6px;height:6px;border-radius:50%;flex:0 0 6px}
.oev.pass .d{background:var(--jade);box-shadow:0 0 4px var(--jade)} .oev.pass .en{color:var(--dim)}
.oev.run .d{background:var(--flame);box-shadow:0 0 4px var(--ember);animation:pulse 1.5s infinite} .oev.run .en{color:var(--paper)}
.oev.fail .d{background:var(--rose)} .oev.fail .en{color:var(--rose)}
.oev.idle .d{background:var(--dim2)} .oev.idle .en{color:var(--dim2)}
.oev .en{flex:1} .oev .tier{font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim2);border:1px solid var(--veil);border-radius:10px;padding:1px 6px}

/* overview mini */
.ovmini{border:1px solid var(--veil);border-radius:8px;padding:12px;background:var(--card)}
.ovhead{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim2);margin-bottom:10px}
.ovrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--mist);font-family:var(--mono);font-size:11px}
.ovrow .rp{color:var(--sun)} .ovrow .cur{color:var(--teal);flex:1}
.ovrow .g{color:var(--sun);font-size:9px} .ovrow .e{font-size:9px;display:inline-flex;gap:3px}
.ovrow .e .p{color:var(--jade)} .ovrow .e .f{color:var(--rose)} .ovrow .e .r{color:var(--flame)}

.note{max-width:600px;margin:22px auto 0;padding:13px 15px;border:1px solid var(--mist);border-left:2px solid var(--jade);border-radius:0 6px 6px 0;background:var(--panel);font-family:var(--mono);font-size:10.5px;color:var(--dim);line-height:1.7}
.note b{color:var(--paper)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="top">
  <div class="brand">lopi · <b>guardrails + evals — placement gallery</b></div>
  <div class="toggle" id="toggle"></div>
</div>
<div class="stage" id="stage"></div>

<script>
"use strict";
const I={
 loop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>',
 clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
 shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v6c0 4-3 7-7 9-4-2-7-5-7-9V6z"/></svg>',
 checkbox:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
 build:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.2L3 17.8 6.2 21l6.3-6.3a4 4 0 0 0 5.2-5.4l-2.6 2.6-2.1-2.1z"/></svg>',
 dup:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
 drag:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>',
 trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
 cpu:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="1.5"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg>',
 gauge:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14l4-4"/><path d="M4 18a8 8 0 1 1 16 0"/></svg>',
 folder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
 ladder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v18M17 3v18M7 8h10M7 13h10M7 18h10"/></svg>',
 coin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v12c0 1.7 3.6 3 8 3s8-1.3 8-3V6"/></svg>',
};
// eval + guard model for the running card
const EVALS=[
 {n:'execution ok',t:'base',s:'pass'},{n:'tests pass',t:'test',s:'pass'},
 {n:'benchmark gate',t:'test',s:'run'},{n:'30-run gate',t:'test',s:'idle'},
 {n:'code review',t:'judge',s:'idle'},{n:'adversarial',t:'suite',s:'idle'},
];
const GUARDS=[{l:'budget:auto'},{l:'max 3'}];
function ecount(){return{pass:EVALS.filter(e=>e.s==='pass').length,fail:EVALS.filter(e=>e.s==='fail').length,run:EVALS.filter(e=>e.s==='run').length,total:EVALS.length};}

const VIEWS=[
 {id:'lines',label:'1 · two lines'},
 {id:'asym',label:'2 · asymmetric'},
 {id:'selrow',label:'3 · guards in selectors'},
 {id:'output',label:'4 · evals in output'},
 {id:'edge',label:'5 · edge gate'},
 {id:'rail',label:'6 · side rail'},
 {id:'overview',label:'7 · overview only'},
];
let view='lines';

function cardHead(){return `<span class="runtag">running · iter 1/3</span>
  <span class="preset">${I.build}progress</span>
  <div class="spec"><span class="al">:progress</span> <span class="md">×3 gate:"./kill_test.sh"</span></div>
  <div class="prog"><i class="done"></i><i class="cur"></i><i></i></div>`;}
function cardBar(guardAct,evalAct,extra){
  const c=ecount();
  return `<div class="cardbar">
    <button class="ib iter">${I.loop}×3</button>
    <button class="ib">${I.clock}</button>
    <button class="ib guard ${guardAct?'act':''}">${I.shield}${guardAct?`<span class="cnt">${GUARDS.length}</span>`:''}</button>
    <button class="ib eval ${evalAct?'act':''}">${I.checkbox}${evalAct?`<span class="cnt">${c.total}</span>`:''}</button>
    <span class="sp"></span>
    <button class="ib">${I.dup}</button><button class="ib">${I.drag}</button><button class="ib">${I.trash}</button>
  </div>${extra||''}`;
}
function guardLine(){return `<div class="sumln guard"><span class="rl">${I.shield}guards</span><span class="txt">${GUARDS.map(g=>`<b>${g.l}</b>`).join(' · ')}</span></div>`;}
function evalLine(){const c=ecount();return `<div class="sumln eval"><span class="rl">${I.checkbox}evals</span><span class="txt"><span class="p">${c.pass}✓</span>${c.run?` · <span class="r">${c.run} running</span>`:''}${c.fail?` · <span class="f">${c.fail}✗</span>`:''} · ${c.total} evals</span></div>`;}
function evalPill(){const c=ecount();return `<span class="evalpill run">${I.checkbox}${c.pass}✓ · ${c.run}…</span>`;}
function outputBlock(withEvalSection){
  const c=ecount();
  let sec='';
  if(withEvalSection){
    sec=`<div class="osec"><div class="osh">${I.checkbox}evals<span class="n">${c.pass}✓ · ${c.run} running · ${c.total}</span></div>
      <div class="oevals">${EVALS.map(e=>`<div class="oev ${e.s}"><span class="d"></span><span class="en">${e.n}</span><span class="tier">${e.t}</span></div>`).join('')}</div></div>`;
  }
  return `<div class="output">
    <div class="obar"><span class="live"><i></i>live · iter 1/3</span>${evalPill()}</div>
    <div class="ostrip"><span class="k">thinking</span> re-run the 30-run gate, only merge if p&lt;0.05 AND the effect…</div>
    ${sec}
  </div>`;
}

function V(){
  if(view==='lines')return `
    <div class="vt">1 · Two lines on card <span class="tag">current default</span></div>
    <div class="vd">Guardrails and evals each as one summary line on the card. Both visible, symmetric. Simple. The version we just folded in.</div>
    <div class="pc">${cardHead()}${cardBar()}${guardLine()}${evalLine()}</div>
    <div class="note"><b>Trade:</b> treats guards and evals as equals. But guards are set-once, evals are watched-live — this shows them with equal weight, which is either clean consistency or a mismatch, depending on taste.</div>`;

  if(view==='asym')return `
    <div class="vt">2 · Asymmetric <span class="tag">guards quiet, evals live</span></div>
    <div class="vd">Guardrails shrink to a tiny glyph row (icons only — budget, max — because they're set-once ambient config). Evals keep the full live line (because they're the running signal). Encodes the real difference in how often each matters.</div>
    <div class="pc">${cardHead()}${cardBar()}
      <div class="glyphrow"><span class="gi">${I.coin}auto</span><span class="sepdot">·</span><span class="gi">${I.loop}max 3</span><span class="sepdot">·</span><span class="gi">${I.shield}stop</span></div>
      ${evalLine()}
    </div>
    <div class="note"><b>Trade:</b> matches behavior to weight — evals get the attention, guards fade to ambient glyphs. Reads well once you learn the glyphs; slightly less legible for guards at first glance (mitigated by the shield button opening the full editor).</div>`;

  if(view==='selrow')return `
    <div class="vt">3 · Guardrails in the selector row <span class="tag">guards = config</span></div>
    <div class="vd">Guardrails leave the card body entirely and join model / effort / repo / autonomy as another set-once selector chip. The card body is then just prompt + evals. Groups all the "settings you pick once" together; leaves the body for the live signal.</div>
    <div class="pc">${cardHead()}
      <div class="selrow">
        <span class="sel model">${I.cpu}Sonnet</span>
        <span class="sel effort">${I.gauge}High</span>
        <span class="sel repo">${I.folder}lopi</span>
        <span class="sel auto">${I.ladder}L2</span>
        <span class="sel guard">${I.shield}budget:auto · max 3</span>
      </div>
      ${cardBar(false,true)}
      ${evalLine()}
    </div>
    <div class="note"><b>Trade:</b> conceptually clean — guardrails ARE config, so they live with the other config. Evals stand alone as the one thing you watch. Cost: the selector row gets busy, and the guards button in the bar becomes redundant with the selector chip.</div>`;

  if(view==='output')return `
    <div class="vt">4 · Evals in the live output <span class="tag">evals = signal</span></div>
    <div class="vd">Evals leave the card body and live entirely in the output attachment as their own section — visible exactly when they matter (during a run), absent when idle. The card stays pure: prompt, guards line, controls. Evals become part of "what's happening now."</div>
    <div class="pc fused">${cardHead()}${cardBar()}${guardLine()}</div>
    ${outputBlock(true)}
    <div class="note"><b>Trade:</b> evals appear where you're already looking during a run, and the card is clean at rest. Cost: while editing an idle loop you don't see the eval set on the card (it's in the collapsed output / behind the check button). Best if "watch" and "configure" are genuinely separate moments.</div>`;

  if(view==='edge')return `
    <div class="vt">5 · Edge gate <span class="tag">evals gate the transition</span></div>
    <div class="vd">The most novel: evals render on the connector BETWEEN this card and the next, as a literal gate. It says "the stack won't advance to the next loop until these pass." Evals become a property of the edge (the flow), not the node (the card). Matches the mental model: the stack moves when the work is accepted.</div>
    <div class="pc">${cardHead()}${cardBar(true,false)}${guardLine()}</div>
    <div class="connector">
      <div class="cline"></div>
      <div class="egate">${I.checkbox} ${ecount().pass}✓ · <span class="r">${ecount().run} running</span> <span style="opacity:.6">→ advances when green</span></div>
      <div class="gatecap">eval gate · next: "draft HN post"</div>
    </div>
    <div class="note"><b>Trade:</b> genuinely different framing — evals as the gate on flow is intuitive and visually distinctive (nobody else does this). Cost: only works cleanly for the "between two cards" case; the last card in a stack has no edge below it, so terminal evals need a fallback. Also mixes "this loop's quality" with "advance the stack," which are subtly different.</div>`;

  if(view==='rail')return `
    <div class="vt">6 · Side rail dashboard <span class="tag">always-glance</span></div>
    <div class="vd">A thin persistent strip down the side of the running card — guardrail gauges (budget burn, iterations used) and eval status as dots, always visible, never cluttering the body. Like a dashboard for the active loop. Card body stays clean; the rail is where you glance for "how's it doing."</div>
    <div class="frame">
      <div class="railcol"><div class="rail">
        <div class="gauge guard">${I.shield}
          <div class="ring"><svg viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="3"/><circle cx="17" cy="17" r="14" fill="none" stroke="var(--sun)" stroke-width="3" stroke-dasharray="88" stroke-dashoffset="59" stroke-linecap="round"/></svg><span class="v">33%</span></div>
        </div>
        <div class="gauge eval">${I.checkbox}
          <div class="evaldots"><i class="pass"></i><i class="pass"></i><i class="run"></i><i></i><i></i><i></i></div>
        </div>
      </div></div>
      <div class="cardcol"><div class="pc railcard">${cardHead()}${cardBar()}</div></div>
    </div>
    <div class="note"><b>Trade:</b> maximally clean card + always-on telemetry. The budget ring and eval dots give an at-a-glance read without any text. Cost: the rail costs horizontal space (tight in a 3-pane layout), and dots/rings are less precise than labels — good for glancing, not for reading exactly which eval failed (tap to expand).</div>`;

  if(view==='overview')return `
    <div class="vt">7 · Overview only <span class="tag">off the card entirely</span></div>
    <div class="vd">The most radical: guardrails and evals don't appear on the pane card at all. The pane is for building + watching one loop's output. Eval/guard health lives in the OVERVIEW, where you triage across all loops. Each overview row shows its guard + eval state; the pane card stays minimal.</div>
    <div class="pc">${cardHead()}${cardBar(true,true)}</div>
    <div style="height:16px"></div>
    <div class="ovmini">
      <div class="ovhead">overview · eval health across loops</div>
      <div class="ovrow"><span class="rp">squish</span><span class="cur">:progress</span><span class="g">${GUARDS.length} guards</span><span class="e"><span class="p">2✓</span><span class="r">1…</span></span></div>
      <div class="ovrow"><span class="rp">vectro</span><span class="cur">:optimize</span><span class="g">3 guards</span><span class="e"><span class="p">4✓</span><span class="f">1✗</span></span></div>
      <div class="ovrow"><span class="rp">lopi</span><span class="cur">:implement</span><span class="g">3 guards</span><span class="e"><span class="p">6✓</span></span></div>
    </div>
    <div class="note"><b>Trade:</b> the cleanest possible card. Cost: probably too far — you can't see or edit a loop's eval set while working on that single loop; you'd bounce to the overview to check. Likely best as a COMPLEMENT (overview aggregates eval health) rather than the only home.</div>`;
}
function render(){document.getElementById('stage').innerHTML=V();}
const tg=document.getElementById('toggle');
tg.innerHTML=VIEWS.map(v=>`<span data-v="${v.id}" class="${v.id===view?'on':''}">${v.label}</span>`).join('');
tg.querySelectorAll('span').forEach(s=>s.onclick=()=>{view=s.dataset.v;tg.querySelectorAll('span').forEach(x=>x.classList.toggle('on',x.dataset.v===view));render();});
render();
</script>
</body>
</html>
