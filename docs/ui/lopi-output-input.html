<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>lopi · :output / :input handoffs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#0b0e10;--panel:#0a0d0f;--card:#0e1214;--paper:#f5f5f5;
  --ice:#00d4ff;--ice-deep:#0a8aa8;--ember:#ff4500;--flame:#ff9500;
  --jade:#00ff9d;--sun:#ffcc00;--rose:#ff2d78;--teal:#00ffd4;--violet:#b79bff;
  --mist:rgba(255,255,255,.05);--veil:rgba(255,255,255,.11);
  --dim:rgba(245,245,245,.46);--dim2:rgba(245,245,245,.27);
  --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Space Grotesk',system-ui,sans-serif;
  --sbar:#161a1c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#060809;color:var(--paper);font-family:var(--sans);-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
.top{padding:11px 18px;border-bottom:1px solid var(--mist);display:flex;align-items:center;gap:12px;flex:0 0 auto}
.brand{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px}
.brand b{color:var(--paper)} .dot{width:6px;height:6px;border-radius:50%;background:var(--violet);box-shadow:0 0 8px var(--violet)}
.tophint{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--dim2)}

.panes{display:flex;height:calc(100vh - 45px)}
.pane{flex:1 1 0;min-width:340px;border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;min-height:0;position:relative}
.pane:last-child{border-right:none}
.pcap{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--violet);padding:9px 15px 0}

.phead{display:flex;align-items:center;gap:9px;padding:9px 15px 12px;border-bottom:1px solid var(--mist);flex:0 0 auto}
.phead .glyph{color:var(--flame);display:flex}.phead .glyph svg{width:15px;height:15px}
.phead .nm{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.phead .state{margin-left:auto;display:flex;align-items:center;gap:6px}
.phead .state i{width:6px;height:6px;border-radius:50%;background:var(--dim2)}
.phead.running .state i{background:var(--flame);box-shadow:0 0 8px var(--ember);animation:pulse 2s infinite}

.composer{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--mist);flex:0 0 auto}
.composer .pr{color:var(--flame);font-family:var(--mono)}
.composer input{flex:1;background:transparent;border:none;outline:none;color:var(--paper);font-family:var(--mono);font-size:12px}
.composer input::placeholder{color:var(--dim2)}
.composer .add{width:27px;height:27px;border-radius:6px;background:transparent;border:1px solid var(--veil);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.14s}
.composer .add:hover{color:var(--ice);border-color:rgba(0,212,255,.4)}.composer .add svg{width:14px;height:14px}

.pbody{flex:1;overflow-y:auto;padding:16px 14px 18px;min-height:0}
.pbody::-webkit-scrollbar{width:8px}.pbody::-webkit-scrollbar-track{background:transparent}
.pbody::-webkit-scrollbar-thumb{background:var(--sbar);border-radius:4px}
.pbody{scrollbar-width:thin;scrollbar-color:var(--sbar) transparent}
.pfoot{flex:0 0 auto;border-top:1px solid var(--mist);padding:12px;display:flex;justify-content:center;background:rgba(255,255,255,.012)}

.stack{position:relative}
.pc{position:relative;background:var(--card);border:1px solid var(--veil);border-radius:6px;padding:11px 12px;isolation:isolate}
.pc.next{border-color:rgba(255,149,0,.5)}
.pc .spec{font-family:var(--mono);font-size:11.5px;line-height:1.5;word-break:break-word}
.pc .spec .al{color:var(--teal)} .pc .spec .md{color:var(--dim)} .pc .spec .rp{color:var(--sun)} .pc .spec .op{color:var(--flame);font-weight:700} .pc .spec .str{color:var(--paper)}
.nexttag{position:absolute;top:-8px;right:10px;font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:#160500;background:var(--ember);padding:1px 6px;border-radius:2px;font-weight:700}

.cardbar{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:9px;border-top:1px solid var(--mist)}
.ib{height:27px;min-width:27px;padding:0 6px;border-radius:5px;border:1px solid var(--veil);background:transparent;color:var(--dim2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:.14s;font-family:var(--mono);font-size:10.5px}
.ib svg{width:13px;height:13px}.ib:hover{color:var(--paper);border-color:var(--dim)}
.ib.danger:hover{color:var(--rose);border-color:rgba(255,45,120,.5)}
.ib.grip{cursor:grab}
.ib.cron.on{color:var(--ice);border-color:rgba(0,212,255,.5);background:rgba(0,212,255,.08)}
.cardbar .sp{flex:1}
.iterpill{display:inline-flex;align-items:center;height:27px;border:1px solid var(--veil);border-radius:5px;overflow:hidden;font-family:var(--mono);font-size:10.5px;color:var(--dim2);cursor:pointer;transition:.14s}
.iterpill .lb{display:flex;align-items:center;gap:5px;padding:0 8px;height:100%}.iterpill .lb svg{width:12px;height:12px}
.iterpill.on{border-color:rgba(255,149,0,.5);background:rgba(255,69,0,.09);color:var(--flame)}
.iterpill .val{font-weight:700}
.iterpill .steppers{display:flex;align-items:center;max-width:0;overflow:hidden;transition:max-width .26s cubic-bezier(.5,0,.2,1)}
.iterpill.on:hover .steppers{max-width:60px}
.iterpill .sb{width:26px;height:27px;border:none;border-left:1px solid rgba(255,149,0,.3);background:transparent;color:var(--flame);font-size:14px;cursor:pointer}
.limitchips{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.lc2{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9.5px;border:1px solid;border-radius:12px;padding:3px 9px}
.lc2.gate{color:var(--rose);border-color:rgba(255,45,120,.45)}
.lc2.until{color:var(--jade);border-color:rgba(0,255,157,.45)}
.lc2 svg{width:10px;height:10px}

.gap{position:relative;height:30px;display:flex;align-items:center;justify-content:center}
.gap .line{width:1px;height:100%;background:var(--veil)}
.gap.flowing .line{width:2px;background:linear-gradient(180deg,rgba(255,149,0,.35),rgba(255,149,0,.95))}

/* ---------- :output / :input styling ---------- */
/* the io cards are slim, violet, and read as pipe fittings */
.io{position:relative;background:linear-gradient(180deg,rgba(183,155,255,.07),rgba(183,155,255,.03));border:1px solid rgba(183,155,255,.4);border-radius:6px;padding:8px 11px;display:flex;align-items:center;gap:9px}
.io .g{color:var(--violet);display:flex}.io .g svg{width:14px;height:14px}
.io .txt{font-family:var(--mono);font-size:11px;color:var(--violet)}
.io .txt b{font-weight:700}
.io .var{color:var(--paper);background:rgba(183,155,255,.14);border-radius:3px;padding:1px 6px;font-size:10px}
.io .rm{margin-left:auto;color:var(--dim2);cursor:pointer;font-size:11px}
.io .rm:hover{color:var(--rose)}
/* the paired connector (option A): a single fused output→input block */
.iopair{position:relative;border:1px solid rgba(183,155,255,.4);border-radius:6px;overflow:hidden;background:linear-gradient(180deg,rgba(183,155,255,.06),rgba(183,155,255,.02))}
.iopair .half{display:flex;align-items:center;gap:9px;padding:8px 11px;font-family:var(--mono);font-size:10.5px;color:var(--violet)}
.iopair .half.out{border-bottom:1px dashed rgba(183,155,255,.3)}
.iopair .half svg{width:13px;height:13px;flex:0 0 13px}
.iopair .half .var{margin-left:auto;color:var(--paper);background:rgba(183,155,255,.14);border-radius:3px;padding:1px 6px;font-size:10px}
.iopair .arrowspine{position:absolute;left:17px;top:26px;bottom:26px;width:0;border-left:1px solid rgba(183,155,255,.5)}

/* option B: port pair bound to the connector between two cards */
.gap.io-b .line{background:none}
.gap.io-b{height:40px}
.iob{position:relative;display:flex;flex-direction:column;align-items:center;font-family:var(--mono);font-size:9px;color:var(--violet)}
.iob .chip{display:flex;align-items:center;gap:5px;border:1px solid rgba(183,155,255,.4);border-radius:10px;padding:3px 10px;background:var(--black);cursor:pointer}
.iob .chip svg{width:10px;height:10px}
.iob .chip .var{color:var(--paper);background:rgba(183,155,255,.14);border-radius:3px;padding:0 5px}

/* add-io hint in a gap */
.addio{position:absolute;font-family:var(--mono);font-size:8.5px;color:var(--dim2);border:1px dashed var(--veil);border-radius:9px;padding:2px 8px;background:var(--black);cursor:pointer;opacity:0;transition:.15s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.addio svg{width:9px;height:9px}
.gap:hover .addio{opacity:1}
.gap:hover .line{opacity:.25}

/* run split / limits popover reused minimal */
.r-split{position:relative;display:inline-flex}
.r-split .main{background:var(--flame);color:#160500;border:none;border-radius:6px;padding:11px 22px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;cursor:pointer;display:flex;align-items:center;gap:8px}
.r-split .main svg{width:13px;height:13px}

.pop{position:fixed;z-index:60;background:var(--panel);border:1px solid var(--veil);border-radius:8px;box-shadow:0 16px 44px rgba(0,0,0,.7);width:300px;overflow:hidden}
.pop .ph{padding:11px 13px;border-bottom:1px solid var(--mist);font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
.gchip-row{display:flex;flex-direction:column;gap:8px;padding:12px}
.gchip{border:1px solid var(--veil);border-radius:6px;overflow:hidden}
.gchip .gh{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--dim)}
.gchip .gh svg{width:12px;height:12px}
.gchip .gh .tog{margin-left:auto;width:32px;height:18px;border-radius:10px;background:#1c1c1e;border:1px solid var(--veil);position:relative;transition:.15s;flex:0 0 32px}
.gchip .gh .tog::after{content:"";position:absolute;width:12px;height:12px;border-radius:50%;background:var(--dim);top:2px;left:2px;transition:.16s}
.gchip.on .gh .tog::after{left:16px}
.gchip.on.gate .gh{color:var(--rose)} .gchip.on.gate .gh .tog{background:rgba(255,45,120,.25);border-color:var(--rose)} .gchip.on.gate .gh .tog::after{background:var(--rose)}
.gchip.on.until .gh{color:var(--jade)} .gchip.on.until .gh .tog{background:rgba(0,255,157,.22);border-color:var(--jade)} .gchip.on.until .gh .tog::after{background:var(--jade)}
.gchip .gbody{max-height:0;overflow:hidden;transition:max-height .24s}.gchip.on .gbody{max-height:60px}
.gchip .gbody .in{margin:0 11px 11px}
.gchip .gbody input{width:100%;background:#0c1113;border:1px solid var(--veil);border-radius:3px;color:var(--paper);font-family:var(--mono);font-size:11px;padding:6px 8px}
.gseg-row{display:flex;align-items:center;gap:10px;padding:2px 11px 11px;font-family:var(--mono);font-size:10px;color:var(--dim2)}
.gseg{display:inline-flex;border:1px solid var(--veil);border-radius:4px;overflow:hidden}
.gseg span{padding:5px 9px;color:var(--dim);cursor:pointer;border-right:1px solid var(--veil)}.gseg span:last-child{border-right:none}
.gseg span.on{background:rgba(0,212,255,.12);color:var(--ice)}
.popfoot{display:flex;padding:10px 12px;border-top:1px solid var(--mist)}
.popfoot button{flex:1;font-family:var(--mono);font-size:10px;border-radius:4px;padding:8px;cursor:pointer;border:none;background:var(--ice-deep);color:#02171d;font-weight:700}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="top">
  <div class="brand"><span class="dot"></span>lopi <b>· :output / :input</b> · explicit handoffs</div>
  <span class="tophint">guards renamed → limits · two ways to pass results between prompts</span>
</div>
<div class="panes" id="panes"></div>

<script>
"use strict";
const I={
 loop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>',
 cron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
 sliders:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="15" cy="7" r="2.3" fill="var(--card)"/><circle cx="9" cy="12" r="2.3" fill="var(--card)"/><circle cx="16" cy="17" r="2.3" fill="var(--card)"/></svg>',
 plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
 play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l14 8-14 8z"/></svg>',
 trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
 drag:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>',
 dup:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
 gate:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>',
 check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
 // output: arrow leaving a box; input: arrow entering a box
 out:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3h5a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-5"/><path d="M3 12h12M11 8l4 4-4 4"/></svg>',
 in:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h5"/><path d="M21 12H9M13 8l-4 4 4 4"/></svg>',
 link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12h6"/><path d="M10 8H7a4 4 0 0 0 0 8h3"/><path d="M14 8h3a4 4 0 0 1 0 8h-3"/></svg>',
 blocks:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="8" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>',
};
function u(){return 'p'+Math.random().toString(36).slice(2,7);}

/* two panes: A = paired io card, B = bound port pair. Also carry Limits rename. */
const PANES=[
 {key:'a',cap:'option A · paired handoff card',stack:[
   {id:u(),k:'prompt',spec:':research',arg:'"paged attention"'},
   {id:u(),k:'io',out:'findings',into:'ctx'},           // fused output→input block
   {id:u(),k:'prompt',spec:':scope'},
   {id:u(),k:'prompt',spec:':implement',loop:true,loopN:3,gate:true,gateCmd:'./kill_test.sh',until:true,untilCmd:'cargo test'},
 ]},
 {key:'b',cap:'option B · ports on the connector',stack:[
   {id:u(),k:'prompt',spec:':benchmark',repo:'@vectro',out:'results'},   // out set → shows out-port below
   {id:u(),k:'prompt',spec:':report',repo:'@konjo.ai',in:'results'},     // in set → shows in-port above, bound
   {id:u(),k:'prompt',spec:':handoff'},
 ]},
];
function paneOf(id){return PANES.find(p=>p.stack.some(x=>x.id===id));}
function find(id){for(const p of PANES){const it=p.stack.find(x=>x.id===id);if(it)return it;}return null;}

function specHTML(it){
  let h=`<span class="al">${it.spec}</span>`;
  if(it.arg)h+=` <span class="str">${it.arg}</span>`;
  if(it.repo)h+=` <span class="rp">${it.repo}</span>`;
  let mods=[];if(it.loop)mods.push('x'+(it.loopN==null?'∞':it.loopN));if(it.gate)mods.push(`gate:"${it.gateCmd}"`);if(it.until)mods.push(`until:"${it.untilCmd}"`);
  if(it.out&&it.k==='prompt')mods.push(`:output ${it.out}`);
  if(it.in&&it.k==='prompt')mods.push(`:input ${it.in}`);
  if(mods.length)h+=` <span class="md">${mods.join(' ').replace(/</g,'&lt;')}</span>`;
  return `<div class="spec">${h}</div>`;}

const panesEl=document.getElementById('panes');
PANES.forEach(p=>{
  const d=document.createElement('div');d.className='pane';d.dataset.k=p.key;
  d.innerHTML=`<div class="pcap">${p.cap}</div>
    <div class="phead"><span class="glyph">${I.blocks}</span><span class="nm">loop stack</span><span class="state"><i></i></span></div>
    <div class="composer"><span class="pr">&gt;</span><input placeholder="add a prompt or goal…"/><button class="add">${I.plus}</button></div>
    <div class="pbody"><div class="stack"></div></div>
    <div class="pfoot"><span class="r-split"><button class="main" data-run="${p.key}">${I.play} run stack</button></span></div>`;
  panesEl.appendChild(d);
});

function render(){
  PANES.forEach(p=>{
    const stackEl=panesEl.querySelector(`[data-k="${p.key}"] .stack`);
    const rev=[...p.stack].reverse();
    let h='';
    rev.forEach((it,i)=>{
      const below=rev[i+1];
      if(it.k==='io'){
        // OPTION A: fused paired card (output of the prompt below → input of the prompt above)
        h+=`<div class="iopair">
            <div class="half out">${I.out} <b>:output</b> <span class="var">${it.out}</span></div>
            <div class="half in">${I.in} <b>:input</b> <span class="var">${it.into}</span></div>
            <div class="arrowspine"></div>
          </div>`;
      } else {
        const isNext=it===p.stack[0];
        h+=`<div class="pc ${isNext?'next':''}">${isNext?'<span class="nexttag">next</span>':''}${specHTML(it)}
          <div class="cardbar">
            <span class="iterpill ${it.loop?'on':''}" data-loop="${it.id}"><span class="lb">${I.loop}${it.loop?`<span class="val">${it.loopN==null?'×∞':'×'+it.loopN}</span>`:''}</span><span class="steppers"><button class="sb" data-dec="${it.id}">−</button><button class="sb" data-inc="${it.id}">+</button></span></span>
            <button class="ib cron ${it.cron?'on':''}" data-cron="${it.id}">${I.cron}</button>
            <button class="ib" data-gear="${it.id}" title="limits">${I.sliders}</button>
            <span class="sp"></span>
            <button class="ib" data-dup="${it.id}">${I.dup}</button>
            <button class="ib grip" data-grip="${it.id}">${I.drag}</button>
            <button class="ib danger" data-del="${it.id}">${I.trash}</button>
          </div>`;
        if(it.gate||it.until){h+='<div class="limitchips">';if(it.gate)h+=`<span class="lc2 gate">${I.gate}gate</span>`;if(it.until)h+=`<span class="lc2 until">${I.check}until</span>`;h+='</div>';}
        h+='</div>';
      }
      // connector between this and the next real card
      if(i<rev.length-1){
        const next=rev[i+1];
        // OPTION B: if this card outputs and the next inputs the same var → bound port chip on the connector
        if(p.key==='b'&&it.k==='prompt'&&it.out&&next&&next.k==='prompt'&&next.in===it.out){
          h+=`<div class="gap io-b"><div class="line"></div>
            <div class="iob"><div class="chip">${I.link} <b>:output</b> <span class="var">${it.out}</span> ${I.out} <b>:input</b></div></div></div>`;
        } else {
          h+=`<div class="gap flowing"><div class="line"></div>
            <div class="addio" data-addio="${p.key}:${i}">${I.link} :output › :input</div></div>`;
        }
      }
    });
    stackEl.innerHTML=h;
  });
  wire();
}

/* limits popover (renamed) */
let pop=null;
function closePop(){if(pop){pop.remove();pop=null;}}
document.addEventListener('click',e=>{if(pop&&!e.target.closest('.pop')&&!e.target.closest('[data-gear]'))closePop();});
function openLimits(it,anchor){
  closePop();pop=document.createElement('div');pop.className='pop';
  pop.innerHTML=`<div class="ph">limits</div>
    <div class="gchip-row">
      <div class="gchip gate ${it.gate?'on':''}"><div class="gh">${I.gate} gate <span style="color:var(--dim2)">· must pass first</span><span class="tog"></span></div><div class="gbody"><div class="in"><input data-gatecmd value="${it.gateCmd||'./kill_test.sh'}"/></div></div></div>
      <div class="gchip until ${it.until?'on':''}"><div class="gh">${I.check} until <span style="color:var(--dim2)">· loop until exit 0</span><span class="tog"></span></div><div class="gbody"><div class="in"><input data-untilcmd value="${it.untilCmd||'cargo test'}"/></div></div></div>
    </div>
    <div class="gseg-row">on&nbsp;fail <span class="gseg" data-onfail><span data-of="stop" class="on">stop</span><span data-of="continue">continue</span><span data-of="backoff">backoff</span></span></div>
    <div class="gseg-row">budget <span class="gseg" data-budget><span data-bud="auto" class="on">auto</span><span data-bud="200k">200k</span><span data-bud="none">none</span></span></div>
    <div class="popfoot"><button data-app>done</button></div>`;
  document.body.appendChild(pop);const r=anchor.getBoundingClientRect();
  let top=r.bottom+8,left=r.left;if(left+300>innerWidth-10)left=innerWidth-310;if(top+pop.offsetHeight>innerHeight-10)top=r.top-pop.offsetHeight-8;
  pop.style.top=Math.max(10,top)+'px';pop.style.left=Math.max(10,left)+'px';
  pop.querySelectorAll('.gchip .gh').forEach(gh=>gh.onclick=()=>gh.closest('.gchip').classList.toggle('on'));
  pop.querySelectorAll('.gseg').forEach(seg=>seg.querySelectorAll('span').forEach(s=>s.onclick=()=>{seg.querySelectorAll('span').forEach(x=>x.classList.remove('on'));s.classList.add('on');}));
  pop.querySelector('[data-app]').onclick=()=>{it.gate=pop.querySelector('.gchip.gate').classList.contains('on');it.until=pop.querySelector('.gchip.until').classList.contains('on');it.gateCmd=pop.querySelector('[data-gatecmd]').value;it.untilCmd=pop.querySelector('[data-untilcmd]').value;closePop();render();};
}

function wire(){
  panesEl.querySelectorAll('[data-loop]').forEach(pl=>pl.querySelector('.lb').onclick=()=>{const it=find(pl.dataset.loop);it.loop=!it.loop;if(it.loop&&it.loopN===undefined)it.loopN=3;render();});
  panesEl.querySelectorAll('[data-inc]').forEach(b=>b.onclick=e=>{e.stopPropagation();const it=find(b.dataset.inc);it.loop=true;it.loopN=it.loopN==null?2:it.loopN+1;render();});
  panesEl.querySelectorAll('[data-dec]').forEach(b=>b.onclick=e=>{e.stopPropagation();const it=find(b.dataset.dec);if(it.loopN==null)return;it.loopN=it.loopN<=2?null:it.loopN-1;render();});
  panesEl.querySelectorAll('[data-gear]').forEach(b=>b.onclick=()=>openLimits(find(b.dataset.gear),b));
  panesEl.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{const p=paneOf(b.dataset.del);p.stack=p.stack.filter(x=>x.id!==b.dataset.del);render();});
  panesEl.querySelectorAll('[data-dup]').forEach(b=>b.onclick=()=>{const it=find(b.dataset.dup);const p=paneOf(it.id);p.stack.splice(p.stack.indexOf(it),0,{...it,id:u()});render();});
  panesEl.querySelectorAll('[data-addio]').forEach(b=>b.onclick=()=>{const[k,gi]=b.dataset.addio.split(':');const p=PANES.find(x=>x.key===k);const idx=p.stack.length-1-(+gi);
    if(k==='a'){p.stack.splice(idx,0,{id:u(),k:'io',out:'result',into:'ctx'});}
    else{ // bind adjacent: set out on lower, in on upper
      const lower=p.stack[idx-1]||p.stack[idx];const upper=p.stack[idx];
      // idx is insertion point between stack[idx-1] and stack[idx]; in reversed view gap i is between rev[i](upper) and rev[i+1](lower)
      const lo=p.stack[idx-1],hi=p.stack[idx];
      if(lo&&hi){lo.out='result';hi.in='result';}
    }
    render();});
  panesEl.querySelectorAll('.composer .add,.composer input').forEach(el=>{});
  panesEl.querySelectorAll('.composer .add').forEach(b=>b.onclick=()=>addFrom(b.closest('.pane')));
  panesEl.querySelectorAll('.composer input').forEach(inp=>inp.onkeydown=e=>{if(e.key==='Enter')addFrom(inp.closest('.pane'));});
}
function addFrom(paneEl){const inp=paneEl.querySelector('.composer input');const v=inp.value.trim();const p=PANES.find(x=>x.key===paneEl.dataset.k);
  const spec=v||':progress';const isAlias=spec.startsWith(':');
  p.stack.push({id:u(),k:'prompt',spec:isAlias?spec.split(' ')[0]:('"'+spec+'"'),loop:false});inp.value='';render();paneEl.querySelector('.pbody').scrollTop=0;}

render();
</script>
