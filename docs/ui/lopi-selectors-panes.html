<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>lopi ┬Ę selectors + add pane</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#0b0e10;--panel:#0a0d0f;--card:#0e1214;--paper:#f5f5f5;
  --ice:#00d4ff;--ice-deep:#0a8aa8;--ember:#ff4500;--flame:#ff9500;
  --jade:#00ff9d;--sun:#ffcc00;--rose:#ff2d78;--teal:#00ffd4;--violet:#b79bff;
  --mist:rgba(255,255,255,.05);--veil:rgba(255,255,255,.11);
  --dim:rgba(245,245,245,.46);--dim2:rgba(245,245,245,.27);
  --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Space Grotesk',system-ui,sans-serif;
  --sbar:#161a1c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#060809;color:var(--paper);font-family:var(--sans);-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}

.panes{display:flex;height:100vh;position:relative}
.pane{flex:1 1 0;min-width:0;border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;min-height:0;position:relative;transition:flex-basis .3s}
.pane:last-child{border-right:none}

.phead{display:flex;align-items:center;gap:9px;padding:11px 15px;border-bottom:1px solid var(--mist);flex:0 0 auto}
.phead .glyph{color:var(--flame);display:flex}.phead .glyph svg{width:15px;height:15px}
.phead .nm{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.phead .state{margin-left:auto;display:flex;align-items:center;gap:6px}
.phead .state i{width:6px;height:6px;border-radius:50%;background:var(--dim2)}
.phead.running .state i{background:var(--flame);box-shadow:0 0 8px var(--ember);animation:pulse 2s infinite}
.phead .x{color:var(--dim2);cursor:pointer;font-size:13px}

/* ---------- selector row (model / effort / repo) ---------- */
.selrow{display:flex;align-items:center;gap:4px;padding:9px 12px;border-bottom:1px solid var(--mist);flex:0 0 auto;flex-wrap:wrap}
.sel{position:relative;display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;color:var(--ice);cursor:pointer;padding:4px 7px;border-radius:5px;transition:.14s}
.sel:hover{background:rgba(0,212,255,.07)}
.sel .cv{color:var(--ice)}
.sel svg{width:11px;height:11px;color:var(--ice-deep)}
.sel.effort .cv{color:var(--flame)} .sel.effort svg{color:var(--flame)}
.sel.repo .cv{color:var(--sun)} .sel.repo svg{color:var(--sun)}
.sel .lbl{color:var(--dim2);font-size:9px;letter-spacing:.08em;text-transform:uppercase;margin-right:1px}
/* dropdown */
.seldrop{position:absolute;top:calc(100% + 6px);left:0;z-index:40;background:var(--panel);border:1px solid var(--veil);border-radius:6px;box-shadow:0 14px 40px rgba(0,0,0,.6);min-width:150px;overflow:hidden;display:none}
.seldrop.open{display:block}
.seldrop button{display:flex;width:100%;align-items:center;gap:8px;padding:8px 11px;background:transparent;border:none;color:var(--paper);cursor:pointer;text-align:left;font-family:var(--mono);font-size:11px;border-bottom:1px solid var(--mist)}
.seldrop button:last-child{border-bottom:none}
.seldrop button:hover{background:rgba(255,255,255,.04)}
.seldrop button.on{color:var(--ice)}
.seldrop button .dot{width:5px;height:5px;border-radius:50%;background:transparent;flex:0 0 5px}
.seldrop button.on .dot{background:var(--ice)}
.seldrop .eff-h{color:var(--flame)} .seldrop .eff-h.on .dot{background:var(--flame)}
.seldrop .sub{font-size:8.5px;color:var(--dim2);margin-left:auto;letter-spacing:.04em}

.composer{display:flex;align-items:center;gap:9px;padding:11px 14px;flex:0 0 auto}
.composer .pr{color:var(--flame);font-family:var(--mono)}
.composer input{flex:1;background:transparent;border:none;outline:none;color:var(--paper);font-family:var(--mono);font-size:12px}
.composer input::placeholder{color:var(--dim2)}
.composer .add{width:27px;height:27px;border-radius:6px;background:transparent;border:1px solid var(--veil);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center}
.composer .add:hover{color:var(--ice);border-color:rgba(0,212,255,.4)}.composer .add svg{width:14px;height:14px}

.pbody{flex:1;overflow-y:auto;padding:16px 14px 18px;min-height:0}
.pbody::-webkit-scrollbar{width:8px}.pbody::-webkit-scrollbar-track{background:transparent}
.pbody::-webkit-scrollbar-thumb{background:var(--sbar);border-radius:4px}
.pbody{scrollbar-width:thin;scrollbar-color:var(--sbar) transparent}
.pfoot{flex:0 0 auto;border-top:1px solid var(--mist);padding:12px;display:flex;justify-content:center;background:rgba(255,255,255,.012)}

.stack{position:relative}
.pc{position:relative;background:var(--card);border:1px solid var(--veil);border-radius:6px;padding:11px 12px;isolation:isolate}
.pc.next{border-color:rgba(255,149,0,.5)}
.pc .spec{font-family:var(--mono);font-size:11.5px;line-height:1.5;word-break:break-word}
.pc .spec .al{color:var(--teal)} .pc .spec .md{color:var(--dim)} .pc .spec .rp{color:var(--sun)} .pc .spec .op{color:var(--flame);font-weight:700} .pc .spec .str{color:var(--paper)}
.pc .ov{font-family:var(--mono);font-size:9px;color:var(--dim2);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
.pc .ov b{color:var(--ice)} .pc .ov .e{color:var(--flame)} .pc .ov .r{color:var(--sun)}
.nexttag{position:absolute;top:-8px;right:10px;font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:#160500;background:var(--ember);padding:1px 6px;border-radius:2px;font-weight:700}

.cardbar{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:9px;border-top:1px solid var(--mist)}
.ib{height:27px;min-width:27px;padding:0 6px;border-radius:5px;border:1px solid var(--veil);background:transparent;color:var(--dim2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:.14s;font-family:var(--mono);font-size:10.5px}
.ib svg{width:13px;height:13px}.ib:hover{color:var(--paper);border-color:var(--dim)}
.ib.danger:hover{color:var(--rose);border-color:rgba(255,45,120,.5)}.ib.grip{cursor:grab}
.ib.cron.on{color:var(--ice);border-color:rgba(0,212,255,.5);background:rgba(0,212,255,.08)}
.cardbar .sp{flex:1}
.iterpill{display:inline-flex;align-items:center;height:27px;border:1px solid var(--veil);border-radius:5px;overflow:hidden;font-family:var(--mono);font-size:10.5px;color:var(--dim2);cursor:pointer;transition:.14s}
.iterpill .lb{display:flex;align-items:center;gap:5px;padding:0 8px;height:100%}.iterpill .lb svg{width:12px;height:12px}
.iterpill.on{border-color:rgba(255,149,0,.5);background:rgba(255,69,0,.09);color:var(--flame)}
.iterpill .val{font-weight:700}
.iterpill .steppers{display:flex;align-items:center;max-width:0;overflow:hidden;transition:max-width .26s cubic-bezier(.5,0,.2,1)}
.iterpill.on:hover .steppers{max-width:60px}
.iterpill .sb{width:26px;height:27px;border:none;border-left:1px solid rgba(255,149,0,.3);background:transparent;color:var(--flame);font-size:14px;cursor:pointer}
.gap{position:relative;height:30px;display:flex;align-items:center;justify-content:center}
.gap .line{width:2px;height:100%;background:linear-gradient(180deg,rgba(255,149,0,.35),rgba(255,149,0,.95))}

.r-split .main{background:var(--flame);color:#160500;border:none;border-radius:6px;padding:11px 22px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;cursor:pointer;display:flex;align-items:center;gap:8px}
.r-split .main svg{width:13px;height:13px}

/* ---------- add-pane hover zones ---------- */
.addzone{position:absolute;top:0;bottom:0;width:64px;z-index:50;display:flex;align-items:center;justify-content:center;cursor:pointer}
.addzone.left{left:0}.addzone.right{right:0}
.addzone .tab{width:34px;height:88px;border:1px dashed var(--veil);background:rgba(10,13,15,.85);backdrop-filter:blur(4px);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--dim2);transition:.22s cubic-bezier(.5,0,.2,1);opacity:0}
.addzone.left .tab{transform:translateX(-42px)}
.addzone.right .tab{transform:translateX(42px)}
.addzone.show .tab{opacity:1;transform:translateX(0);border-color:rgba(0,212,255,.5);color:var(--ice)}
.addzone .tab svg{width:16px;height:16px}
.addzone .tab .v{writing-mode:vertical-rl;text-orientation:mixed;font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase}
.addzone .tab:hover{background:rgba(0,212,255,.1)}

/* new pane insertion animation */
.pane.entering{animation:paneIn .32s cubic-bezier(.5,0,.2,1)}
@keyframes paneIn{from{flex-grow:0;opacity:0}to{flex-grow:1;opacity:1}}
.pane.empty{align-items:center;justify-content:center;color:var(--dim2)}
.pane .emptyorb{display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;margin:auto}
.pane .emptyorb canvas{width:120px;height:120px}
.pane .emptyorb .sub{font-family:var(--mono);font-size:10px;color:var(--dim2);letter-spacing:.06em}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="panes" id="panes"></div>

<script>
"use strict";
const REDUCED=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
const I={
 loop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>',
 cron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
 sliders:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="15" cy="7" r="2.3" fill="var(--card)"/><circle cx="9" cy="12" r="2.3" fill="var(--card)"/><circle cx="16" cy="17" r="2.3" fill="var(--card)"/></svg>',
 plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
 play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l14 8-14 8z"/></svg>',
 trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
 drag:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>',
 dup:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
 chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>',
 blocks:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="8" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>',
 cpu:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="7" width="10" height="10" rx="1"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/></svg>',
 gauge:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14l4-4"/><path d="M4 18a8 8 0 1 1 16 0"/></svg>',
 folder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
};
function u(){return 'p'+Math.random().toString(36).slice(2,7);}

const MODELS=[['Opus 4.8','most capable'],['Sonnet 4.6','balanced'],['Haiku 4.5','fastest'],['Fable 5','frontier']];
const EFFORTS=[['Low','fast, cheap'],['Medium','default'],['High','deep, slow']];
const REPOS=['/Users/wscholl/drex','konjoai/squish','konjoai/vectro','konjoai/kiban','konjoai/lopi'];

const PANES=[
 {key:'a',running:true,model:'Sonnet 4.6',effort:'Medium',repo:'konjoai/squish',stack:[
   {id:u(),spec:':progress',loop:true,loopN:3},
   {id:u(),spec:':benchmark',repo:'@vectro',ovModel:'Opus 4.8',ovEffort:'High'},
   {id:u(),spec:'"draft HN launch post revision"',lit:true},
 ]},
 {key:'b',running:false,model:'Opus 4.8',effort:'High',repo:'/Users/wscholl/drex',stack:[
   {id:u(),spec:':optimize',gate:true,gateCmd:'./kill_test.sh',until:true,untilCmd:'cargo test'},
   {id:u(),spec:':kill-test',cron:true,cronStr:'0 14 * * *',cronHuman:'daily 14:00'},
   {id:u(),spec:':implement',loop:true,loopN:5},
   {id:u(),spec:':handoff'},
 ]},
];
function paneOf(id){return PANES.find(p=>p.stack.some(x=>x.id===id));}
function find(id){for(const p of PANES){const it=p.stack.find(x=>x.id===id);if(it)return it;}return null;}

function specHTML(it){
  let h=it.lit?`<span class="str">${it.spec.replace(/</g,'&lt;')}</span>`:`<span class="al">${it.spec}</span>`;
  if(it.repo)h+=` <span class="rp">${it.repo}</span>`;
  let mods=[];if(it.loop)mods.push('x'+(it.loopN==null?'Ōł×':it.loopN));if(it.gate)mods.push(`gate:"${it.gateCmd}"`);if(it.until)mods.push(`until:"${it.untilCmd}"`);if(it.cron&&it.cronStr)mods.push(`at:"${it.cronStr}"`);
  if(mods.length)h+=` <span class="md">${mods.join(' ').replace(/</g,'&lt;')}</span>`;
  return `<div class="spec">${h}</div>`;}
function overrideRow(it,pane){
  // show per-card overrides only when they differ from the stack default
  let parts=[];
  if(it.ovModel&&it.ovModel!==pane.model)parts.push(`<span>model <b>${it.ovModel}</b></span>`);
  if(it.ovEffort&&it.ovEffort!==pane.effort)parts.push(`<span>effort <span class="e">${it.ovEffort}</span></span>`);
  if(it.repo)parts.push(`<span>repo <span class="r">${it.repo}</span></span>`);
  return parts.length?`<div class="ov">${parts.join('')}</div>`:'';
}

/* orb (for empty new-pane preview) */
function orbTex(S,seed){const perm=[...Array(256).keys()];let a=seed;const r=()=>{a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};
  for(let i=255;i>0;i--){const j=(r()*(i+1))|0;[perm[i],perm[j]]=[perm[j],perm[i]];}const P=new Uint8Array(512);for(let i=0;i<512;i++)P[i]=perm[i&255];
  const n2=(x,y)=>{const xi=Math.floor(x)&255,yi=Math.floor(y)&255,xf=x-Math.floor(x),yf=y-Math.floor(y),u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);const aa=P[P[xi]+yi]/255,b=P[P[xi+1]+yi]/255,c=P[P[xi]+yi+1]/255,d=P[P[xi+1]+yi+1]/255;return aa+(b-aa)*u+(c-aa)*v+(aa-b-c+d)*u*v;};
  const cv=document.createElement('canvas');cv.width=cv.height=S;const ctx=cv.getContext('2d'),img=ctx.createImageData(S,S);
  for(let y=0;y<S;y++)for(let x=0;x<S;x++){let f=0,amp=.5,fr=6/S;for(let o=0;o<4;o++){f+=amp*n2(x*fr,y*fr);amp*=.55;fr*=2.1;}let R,G,B;if(f<.42){const t=f/.42;R=3+t*6;G=32+t*90;B=44+t*110;}else if(f<.62){const t=(f-.42)/.2;R=9+t*30;G=122+t*80;B=154+t*80;}else{const t=Math.min(1,(f-.62)/.3);R=39+t*150;G=202+t*45;B=234+t*20;}const i=(y*S+x)*4;img.data[i]=R;img.data[i+1]=G;img.data[i+2]=B;img.data[i+3]=255;}
  ctx.putImageData(img,0,0);return cv;}
const T1=orbTex(200,7),T2=orbTex(200,23);const orbCvs=[];
function drawOrbInto(cv,t){const ctx=cv.getContext('2d');const S=120,cx=S/2,cy=S/2,r=S*.36;const dpr=Math.min(devicePixelRatio||1,2);
  if(cv.width!==S*dpr){cv.width=S*dpr;cv.height=S*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
  ctx.clearRect(0,0,S,S);const au=ctx.createRadialGradient(cx,cy,r*.8,cx,cy,r*1.7);au.addColorStop(0,'rgba(0,212,255,.10)');au.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=au;ctx.beginPath();ctx.arc(cx,cy,r*1.7,0,7);ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.clip();const d=(tex,ang,al,sc)=>{ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);ctx.globalAlpha=al;const s=r*2*sc;ctx.drawImage(tex,-s/2,-s/2,s,s);ctx.restore();};
  d(T1,t*.05,1,1.25);ctx.globalCompositeOperation='overlay';d(T2,-t*.075,.75,1.5);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
  const sh=ctx.createRadialGradient(cx-r*.28,cy-r*.3,r*.1,cx,cy,r*1.02);sh.addColorStop(0,'rgba(255,255,255,.10)');sh.addColorStop(.55,'rgba(0,0,0,0)');sh.addColorStop(1,'rgba(0,10,14,.55)');ctx.fillStyle=sh;ctx.fillRect(0,0,S,S);
  ctx.restore();ctx.strokeStyle='rgba(120,230,255,.25)';ctx.lineWidth=.6;ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.stroke();}
function orbLoop(now){orbCvs.forEach(cv=>{if(cv.isConnected)drawOrbInto(cv,now/1000);});if(!REDUCED)requestAnimationFrame(orbLoop);}
requestAnimationFrame(orbLoop);

const panesEl=document.getElementById('panes');
function build(){
  panesEl.innerHTML='';orbCvs.length=0;
  PANES.forEach(p=>{
    const d=document.createElement('div');d.className='pane'+(p.entering?' entering':'');d.dataset.k=p.key;p.entering=false;
    if(p.empty){
      d.classList.add('empty');
      d.innerHTML=`<div class="emptyorb"><canvas></canvas><div class="sub">ŌĆö idle ŌĆö<br/>type a goal to begin a stack</div></div>`;
      panesEl.appendChild(d);orbCvs.push(d.querySelector('canvas'));return;
    }
    d.innerHTML=`<div class="phead"><span class="glyph">${I.blocks}</span><span class="nm">loop stack</span><span class="state"><i></i></span><span class="x">Ō£Ģ</span></div>
      <div class="composer"><span class="pr">&gt;</span><input placeholder="add a prompt or goalŌĆ”"/><button class="add">${I.plus}</button></div>
      <div class="selrow">
        <div class="sel model">${I.cpu}<span class="cv">${p.model}</span>${I.chev}<div class="seldrop" data-drop="model"></div></div>
        <div class="sel effort">${I.gauge}<span class="cv">${p.effort}</span>${I.chev}<div class="seldrop" data-drop="effort"></div></div>
        <div class="sel repo">${I.folder}<span class="cv">${p.repo.split('/').slice(-1)[0]}</span>${I.chev}<div class="seldrop" data-drop="repo"></div></div>
      </div>
      <div class="pbody"><div class="stack"></div></div>
      <div class="pfoot"><span class="r-split"><button class="main" data-run="${p.key}">${I.play} run stack</button></span></div>`;
    panesEl.appendChild(d);
  });
  addZones();
  render();
}
function render(){
  PANES.forEach(p=>{
    if(p.empty)return;
    const paneEl=panesEl.querySelector(`[data-k="${p.key}"]`);
    paneEl.querySelector('.phead').className='phead'+(p.running?' running':'');
    const stackEl=paneEl.querySelector('.stack');
    const rev=[...p.stack].reverse();let h='';
    rev.forEach((it,i)=>{
      const isNext=it===p.stack[0];
      h+=`<div class="pc ${isNext?'next':''}">${isNext?'<span class="nexttag">next</span>':''}${specHTML(it)}${overrideRow(it,p)}
        <div class="cardbar">
          <span class="iterpill ${it.loop?'on':''}" data-loop="${it.id}"><span class="lb">${I.loop}${it.loop?`<span class="val">${it.loopN==null?'├ŚŌł×':'├Ś'+it.loopN}</span>`:''}</span><span class="steppers"><button class="sb" data-dec="${it.id}">ŌłÆ</button><button class="sb" data-inc="${it.id}">+</button></span></span>
          <button class="ib cron ${it.cron?'on':''}" data-cron="${it.id}">${I.cron}</button>
          <button class="ib" data-gear="${it.id}" title="limits">${I.sliders}</button>
          <span class="sp"></span>
          <button class="ib" data-dup="${it.id}">${I.dup}</button>
          <button class="ib grip">${I.drag}</button>
          <button class="ib danger" data-del="${it.id}">${I.trash}</button>
        </div></div>`;
      if(i<rev.length-1)h+=`<div class="gap"><div class="line"></div></div>`;
    });
    stackEl.innerHTML=h;
  });
  wireSelectors();wireCards();
}

/* selectors */
let openDrop=null;
function wireSelectors(){
  panesEl.querySelectorAll('.sel').forEach(sel=>{
    sel.onclick=e=>{
      if(e.target.closest('.seldrop'))return;
      const drop=sel.querySelector('.seldrop');const kind=drop.dataset.drop;const p=PANES.find(x=>x.key===sel.closest('.pane').dataset.k);
      const wasOpen=drop.classList.contains('open');
      document.querySelectorAll('.seldrop').forEach(d=>d.classList.remove('open'));
      if(wasOpen){return;}
      let opts='';
      if(kind==='model')opts=MODELS.map(m=>`<button class="${m[0]===p.model?'on':''}" data-val="${m[0]}"><span class="dot"></span>${m[0]}<span class="sub">${m[1]}</span></button>`).join('');
      if(kind==='effort')opts=EFFORTS.map(m=>`<button class="eff-h ${m[0]===p.effort?'on':''}" data-val="${m[0]}"><span class="dot"></span>${m[0]}<span class="sub">${m[1]}</span></button>`).join('');
      if(kind==='repo')opts=REPOS.map(r=>`<button class="${r===p.repo?'on':''}" data-val="${r}"><span class="dot"></span>${r.split('/').slice(-1)[0]}<span class="sub">${r.includes('/Users')?'path':'@'+r.split('/')[0]}</span></button>`).join('');
      drop.innerHTML=opts;drop.classList.add('open');
      drop.querySelectorAll('button').forEach(b=>b.onclick=ev=>{ev.stopPropagation();
        if(kind==='model')p.model=b.dataset.val;if(kind==='effort')p.effort=b.dataset.val;if(kind==='repo')p.repo=b.dataset.val;
        drop.classList.remove('open');build();});
    };
  });
}
document.addEventListener('click',e=>{if(!e.target.closest('.sel'))document.querySelectorAll('.seldrop').forEach(d=>d.classList.remove('open'));});

function wireCards(){
  panesEl.querySelectorAll('[data-loop]').forEach(pl=>pl.querySelector('.lb').onclick=()=>{const it=find(pl.dataset.loop);it.loop=!it.loop;if(it.loop&&it.loopN===undefined)it.loopN=3;render();});
  panesEl.querySelectorAll('[data-inc]').forEach(b=>b.onclick=e=>{e.stopPropagation();const it=find(b.dataset.inc);it.loop=true;it.loopN=it.loopN==null?2:it.loopN+1;render();});
  panesEl.querySelectorAll('[data-dec]').forEach(b=>b.onclick=e=>{e.stopPropagation();const it=find(b.dataset.dec);if(it.loopN==null)return;it.loopN=it.loopN<=2?null:it.loopN-1;render();});
  panesEl.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{const p=paneOf(b.dataset.del);p.stack=p.stack.filter(x=>x.id!==b.dataset.del);render();});
  panesEl.querySelectorAll('[data-dup]').forEach(b=>b.onclick=()=>{const it=find(b.dataset.dup);const p=paneOf(it.id);p.stack.splice(p.stack.indexOf(it),0,{...it,id:u()});render();});
  panesEl.querySelectorAll('.composer .add').forEach(b=>b.onclick=()=>addFrom(b.closest('.pane')));
  panesEl.querySelectorAll('.composer input').forEach(inp=>inp.onkeydown=e=>{if(e.key==='Enter')addFrom(inp.closest('.pane'));});
  panesEl.querySelectorAll('.x').forEach(x=>x.onclick=()=>{const k=x.closest('.pane').dataset.k;if(PANES.length>1){const i=PANES.findIndex(p=>p.key===k);PANES.splice(i,1);build();}});
}
function addFrom(paneEl){const inp=paneEl.querySelector('.composer input');const v=inp.value.trim();const p=PANES.find(x=>x.key===paneEl.dataset.k);const spec=v||':progress';const isAlias=spec.startsWith(':');
  p.stack.push({id:u(),spec:isAlias?spec.split(' ')[0]:('"'+spec+'"'),lit:!isAlias});inp.value='';render();paneEl.querySelector('.pbody').scrollTop=0;}

/* ---------- add-pane hover zones ---------- */
function addZones(){
  document.querySelectorAll('.addzone').forEach(z=>z.remove());
  ['left','right'].forEach(side=>{
    const z=document.createElement('div');z.className='addzone '+side;
    z.innerHTML=`<div class="tab">${I.plus}<span class="v">new stack</span></div>`;
    z.addEventListener('mouseenter',()=>z.classList.add('show'));
    z.addEventListener('mouseleave',()=>z.classList.remove('show'));
    z.onclick=()=>addPane(side);
    panesEl.appendChild(z);
  });
}
function addPane(side){
  const np={key:u(),empty:true,entering:true,model:'Sonnet 4.6',effort:'Medium',repo:'/Users/wscholl/drex',stack:[]};
  if(side==='left')PANES.unshift(np);else PANES.push(np);
  build();
}

build();
</script>
