<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>lopi · stack controls — button options</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#0b0e10;--panel:#0a0d0f;--card:#0e1214;--paper:#f5f5f5;
  --ice:#00d4ff;--ice-deep:#0a8aa8;--ember:#ff4500;--flame:#ff9500;
  --jade:#00ff9d;--sun:#ffcc00;--rose:#ff2d78;--teal:#00ffd4;
  --mist:rgba(255,255,255,.05);--veil:rgba(255,255,255,.11);
  --dim:rgba(245,245,245,.46);--dim2:rgba(245,245,245,.27);
  --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--paper);font-family:var(--sans);-webkit-font-smoothing:antialiased;padding:0 0 80px}
.wrap{max-width:820px;margin:0 auto;padding:0 20px}
.top{position:sticky;top:0;z-index:10;background:rgba(11,14,16,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--mist);padding:16px 20px;margin-bottom:8px}
.brand{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px}
.brand b{color:var(--paper)} .dot{width:6px;height:6px;border-radius:50%;background:var(--ember);box-shadow:0 0 8px var(--ember)}
.lede{color:var(--dim);font-size:13px;margin-top:8px;max-width:620px}

section{border-bottom:1px solid var(--mist);padding:30px 0}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim2);margin-bottom:4px}
h2{font-size:18px;font-weight:500;margin-bottom:4px}
.sdesc{color:var(--dim);font-size:12.5px;margin-bottom:20px;max-width:600px}

.opts{display:flex;flex-direction:column;gap:14px}
.orow{display:grid;grid-template-columns:76px 1fr;gap:16px;align-items:center;padding:14px 16px;background:var(--panel);border:1px solid var(--mist);border-radius:6px}
.olabel{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim2);line-height:1.5}
.olabel b{display:block;color:var(--flame);font-size:11px;margin-bottom:3px}
.odemo{display:flex;align-items:center;gap:12px;flex-wrap:wrap}

/* base shared */
.mono{font-family:var(--mono)}
.card-sim{background:var(--card);border:1px solid var(--veil);border-radius:5px;padding:10px 11px;min-width:210px}
.card-sim .spec{font-family:var(--mono);font-size:11.5px}
.card-sim .spec .al{color:var(--teal)} .card-sim .spec .md{color:var(--dim)}

/* ============ style: chip (outlined pill) ============ */
.c-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;
  border:1px solid var(--veil);border-radius:4px;padding:6px 10px;color:var(--dim);cursor:pointer;transition:.15s;background:transparent;user-select:none}
.c-chip:hover{color:var(--paper);border-color:var(--dim)}
.c-chip svg{width:12px;height:12px}
.c-chip.loop.on{color:var(--flame);border-color:rgba(255,149,0,.5);background:rgba(255,69,0,.09)}
.c-chip.cron.on{color:var(--ice);border-color:rgba(0,212,255,.5);background:rgba(0,212,255,.08)}
.c-chip.ghost{border-style:dashed;color:var(--dim2)}

/* ============ style: solid ============ */
.c-solid{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;
  border:none;border-radius:4px;padding:7px 13px;cursor:pointer;transition:.15s;font-weight:500}
.c-solid svg{width:12px;height:12px}
.c-solid.run{background:var(--flame);color:#160500}.c-solid.run:hover{background:#ffab33}
.c-solid.ice{background:var(--ice-deep);color:#02171d}.c-solid.ice:hover{filter:brightness(1.15)}
.c-solid.ghost{background:rgba(255,255,255,.06);color:var(--dim)}.c-solid.ghost:hover{background:rgba(255,255,255,.1);color:var(--paper)}

/* ============ style: icon-only ============ */
.c-icon{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--veil);border-radius:5px;color:var(--dim);cursor:pointer;transition:.15s;background:transparent}
.c-icon:hover{color:var(--paper);border-color:var(--dim);background:rgba(255,255,255,.03)}
.c-icon svg{width:14px;height:14px}
.c-icon.warm:hover{color:var(--flame);border-color:rgba(255,149,0,.5)}
.c-icon.cool:hover{color:var(--ice);border-color:rgba(0,212,255,.5)}
.c-icon.danger:hover{color:var(--rose);border-color:rgba(255,45,120,.5)}

/* ============ stepper variants ============ */
.step{display:inline-flex;align-items:center;font-family:var(--mono);font-size:11px;border:1px solid var(--veil);border-radius:4px;overflow:hidden}
.step.on{border-color:rgba(255,149,0,.5)}
.step .lb{display:flex;align-items:center;gap:5px;padding:6px 9px;color:var(--flame);border-right:1px solid var(--veil)}
.step .lb svg{width:11px;height:11px}
.step .sb{width:26px;height:30px;background:transparent;border:none;color:var(--dim);font-size:14px;cursor:pointer;transition:.12s}
.step .sb:hover{background:rgba(255,149,0,.12);color:var(--flame)}
.step .val{min-width:34px;text-align:center;color:var(--paper);font-weight:700;border-left:1px solid var(--mist);border-right:1px solid var(--mist);height:30px;line-height:30px}

.step2{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px}
.step2 .rb{width:28px;height:28px;border-radius:50%;border:1px solid var(--veil);background:transparent;color:var(--flame);font-size:15px;cursor:pointer;transition:.12s}
.step2 .rb:hover{background:rgba(255,149,0,.14)}
.step2 .val{color:var(--flame);font-weight:700;font-size:15px;min-width:30px;text-align:center}
.step2 .cap{color:var(--dim2);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase}

.dial{display:inline-flex;align-items:center;gap:2px}
.dial .seg{font-family:var(--mono);font-size:10.5px;padding:6px 9px;border:1px solid var(--veil);color:var(--dim);cursor:pointer;transition:.12s}
.dial .seg:first-child{border-radius:4px 0 0 4px}.dial .seg:last-child{border-radius:0 4px 4px 0}
.dial .seg:not(:last-child){border-right:none}
.dial .seg.on{background:rgba(255,69,0,.14);color:var(--flame);border-color:rgba(255,149,0,.5)}

/* ============ schedule variants ============ */
.cronfield{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;border:1px solid var(--veil);border-radius:4px;padding:5px 6px 5px 10px}
.cronfield.on{border-color:rgba(0,212,255,.5)}
.cronfield svg{width:12px;height:12px;color:var(--ice)}
.cronfield input{background:transparent;border:none;outline:none;color:var(--ice);font-family:var(--mono);font-size:11px;width:88px}
.cronfield .go{background:var(--ice-deep);border:none;color:#02171d;border-radius:3px;width:22px;height:22px;cursor:pointer}
.presets{display:inline-flex;gap:5px;flex-wrap:wrap}
.preset{font-family:var(--mono);font-size:10px;border:1px solid var(--veil);border-radius:20px;padding:5px 11px;color:var(--dim);cursor:pointer;transition:.12s}
.preset:hover,.preset.on{color:var(--ice);border-color:rgba(0,212,255,.5);background:rgba(0,212,255,.08)}
.natlang{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;border:1px solid var(--veil);border-radius:4px;padding:7px 12px;color:var(--dim);cursor:pointer}
.natlang.on{color:var(--ice);border-color:rgba(0,212,255,.5)}
.natlang svg{width:12px;height:12px;color:var(--ice)}
.natlang b{color:var(--ice);font-weight:500}

/* ============ inline card control bar (the real integration) ============ */
.cardbar{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:9px;border-top:1px solid var(--mist)}
.cardbar .ib{width:26px;height:26px;border-radius:4px;border:1px solid var(--veil);background:transparent;color:var(--dim2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.14s}
.cardbar .ib svg{width:13px;height:13px}
.cardbar .ib:hover{color:var(--paper);border-color:var(--dim)}
.cardbar .ib.loop.on{color:var(--flame);border-color:rgba(255,149,0,.5);background:rgba(255,69,0,.1)}
.cardbar .ib.cron.on{color:var(--ice);border-color:rgba(0,212,255,.5);background:rgba(0,212,255,.08)}
.cardbar .sp{flex:1}
.cardbar .ib.danger:hover{color:var(--rose);border-color:rgba(255,45,120,.5)}
.miniloop{display:inline-flex;align-items:center;border:1px solid rgba(255,149,0,.5);border-radius:4px;overflow:hidden;height:26px}
.miniloop .lb{color:var(--flame);padding:0 6px;display:flex;align-items:center}
.miniloop .lb svg{width:11px;height:11px}
.miniloop .mb{width:20px;height:24px;background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:13px}
.miniloop .mb:hover{color:var(--flame);background:rgba(255,149,0,.12)}
.miniloop .mv{min-width:26px;text-align:center;color:var(--flame);font-weight:700;font-size:11px}

/* run controls */
.runrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

.note{font-family:var(--mono);font-size:10.5px;color:var(--dim2);margin-top:16px;line-height:1.7;border-top:1px dashed var(--mist);padding-top:12px}
.note b{color:var(--dim)}
</style>
</head>
<body>
<div class="top">
  <div class="brand"><span class="dot"></span>lopi <b>· stack controls</b> · button options</div>
  <div class="lede">Every control you need to build a rasen stack, shown in a few visual languages. Pick one language per control type; they're designed to combine.</div>
</div>
<div class="wrap" id="wrap"></div>

<script>
"use strict";
const I={
 loop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>',
 cron:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
 plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
 play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l14 8-14 8z"/></svg>',
 pause:'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>',
 stop:'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>',
 edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
 trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
 drag:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>',
 dup:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
 drain:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l4-4m-4 4l-4-4"/><path d="M5 21h14"/></svg>',
 bump:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5m0 0l-6 6m6-6l6 6"/></svg>',
 gate:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>',
};
const W=document.getElementById('wrap');
function sect(eyebrow,title,desc,rows,note){
  let h=`<section><div class="eyebrow">${eyebrow}</div><h2>${title}</h2><div class="sdesc">${desc}</div><div class="opts">`;
  rows.forEach(r=>h+=`<div class="orow"><div class="olabel"><b>${r[0]}</b>${r[1]}</div><div class="odemo">${r[2]}</div></div>`);
  h+='</div>'+(note?`<div class="note">${note}</div>`:'')+'</section>';
  W.insertAdjacentHTML('beforeend',h);
}

/* 1 · ADD A PROMPT */
sect('01','Add a prompt to the stack',
 'The primary build action. Appears at the top of the stack and, in some designs, between cards.',[
 ['solid','filled bar', `<button class="c-solid ice">${I.plus} stage prompt</button>`],
 ['ghost','dashed row', `<button class="c-solid ghost" style="width:280px;justify-content:center;border:1px dashed var(--veil);background:transparent">${I.plus} stage a prompt</button>`],
 ['inline','＋ between cards', `<span class="c-icon cool">${I.plus}</span><span style="color:var(--dim2);font-family:var(--mono);font-size:10px">hover a connector to insert</span>`],
 ['chip','compact', `<button class="c-chip">${I.plus} add</button>`],
]);

/* 2 · ITERATIONS (loop count) */
sect('02','Iterations · repeat count',
 'Turn a prompt into a repeating one and set how many times. ∞ means run until a guard stops it. Note the naming question: repeat vs iterate.',[
 ['toggle+step','chip expands', `<button class="c-chip loop on">${I.loop} <span class="miniloop" style="border:none;height:auto"><button class="mb" data-d="-1">−</button><span class="mv" data-v>×3</span><button class="mb" data-d="1">+</button></span></button>`],
 ['segmented','inline stepper', `<span class="step on"><span class="lb">${I.loop}</span><button class="sb" data-d="-1">−</button><span class="val" data-v>3</span><button class="sb" data-d="1">+</button></span>`],
 ['round','big steppers', `<span class="step2"><button class="rb" data-d="-1">−</button><span class="val" data-v>3</span><button class="rb" data-d="1">+</button><span class="cap">iterations</span></span>`],
 ['presets','quick dial', `<span class="dial"><span class="seg" data-set="1">×1</span><span class="seg on" data-set="3">×3</span><span class="seg" data-set="5">×5</span><span class="seg" data-set="10">×10</span><span class="seg" data-set="inf">×∞</span></span>`],
], 'The ×∞ option should always show its implicit guards nearby (max:25, budget:auto) so infinity never looks unbounded.');

/* 3 · SCHEDULE */
sect('03','Schedule · when it fires',
 'Attach a cron or interval trigger. Raw cron for power, presets for speed, natural language for clarity.',[
 ['raw','cron field', `<span class="cronfield on">${I.cron}<input value="0 14 * * *"/><button class="go">✓</button></span>`],
 ['presets','pill choices', `<span class="presets"><span class="preset on">every 15m</span><span class="preset">hourly</span><span class="preset">daily 2am</span><span class="preset">Mon 9am</span><span class="preset">custom…</span></span>`],
 ['natural','human readable', `<span class="natlang on">${I.cron} fires <b>tomorrow 14:00</b> ⌄</span>`],
 ['toggle','off by default', `<button class="c-chip cron">${I.cron} schedule</button> <span style="color:var(--dim2);font-family:var(--mono);font-size:10px">→ opens picker</span>`],
]);

/* 4 · GUARDS / GATE */
sect('04','Guards · gate + until',
 'Pre-flight gate (must pass before running) and until-condition (loop until a command exits 0). Both are shell commands.',[
 ['chip','toggle + field', `<button class="c-chip on" style="color:var(--rose);border-color:rgba(255,45,120,.5);background:rgba(255,45,120,.08)">${I.gate} gate</button> <span class="cronfield" style="border-color:rgba(255,45,120,.4)"><input style="color:var(--rose);width:120px" value="./kill_test.sh"/></span>`],
 ['until','condition', `<span class="cronfield on" style="border-color:rgba(0,255,157,.45)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--jade)" stroke-width="2" style="width:12px;height:12px"><path d="M20 6L9 17l-5-5"/></svg><input style="color:var(--jade);width:120px" value="cargo test"/></span> <span style="color:var(--dim2);font-family:var(--mono);font-size:10px">until exits 0</span>`],
]);

/* 5 · PER-CARD EDIT CONTROLS */
sect('05','Per-card controls (build mode)',
 'What sits on each card while editing: reorder, duplicate, delete, plus the loop/schedule toggles. Two integration styles below.',[
 ['icon bar','footer of card', `<div class="card-sim"><div class="spec"><span class="al">:optimize</span> <span class="md">gate:"…" until:"cargo test"</span></div>
   <div class="cardbar"><button class="ib loop">${I.loop}</button><button class="ib cron">${I.cron}</button><span class="sp"></span><button class="ib">${I.dup}</button><button class="ib danger">${I.trash}</button></div></div>`],
 ['hover corner','minimal', `<div class="card-sim" style="position:relative">
   <div style="position:absolute;top:8px;right:8px;display:flex;gap:4px"><span class="c-icon" style="width:24px;height:24px">${I.drag}</span><span class="c-icon danger" style="width:24px;height:24px">${I.trash}</span></div>
   <div class="spec"><span class="al">:progress</span> <span class="md">x3</span></div>
   <div style="margin-top:9px"><button class="c-chip loop on" style="padding:4px 8px"><span class="miniloop" style="border:none;height:auto"><button class="mb" data-d="-1">−</button><span class="mv" data-v>×3</span><button class="mb" data-d="1">+</button></span></button> <button class="c-chip cron" style="padding:4px 8px">${I.cron}</button></div></div>`],
]);

/* 6 · MODE + RUN CONTROLS */
sect('06','Build / run · lifecycle controls',
 'The mode toggle, the run action, and the live controls that replace it once a stack is running.',[
 ['mode','build ⇄ flow', `<span class="dial"><span class="seg on" data-mode="build">✎ build</span><span class="seg" data-mode="flow">▶ flow</span></span>`],
 ['run','launch the stack', `<button class="c-solid run">${I.play} run stack</button>`],
 ['live','while running', `<div class="runrow"><button class="c-icon warm" title="pause">${I.pause}</button><button class="c-icon cool" title="drain">${I.drain}</button><button class="c-icon warm" title="bump +1">${I.bump}</button><button class="c-icon danger" title="kill">${I.stop}</button><span style="font-family:var(--mono);font-size:9.5px;color:var(--dim2)">pause · drain · bump · kill</span></div>`],
 ['run full','labelled live bar', `<div class="runrow"><button class="c-solid ghost">${I.pause} pause</button><button class="c-solid ghost">${I.drain} drain</button><button class="c-solid ghost" style="color:var(--rose)">${I.stop} kill</button></div>`],
], 'These four verbs (pause, drain, bump, kill) are the framework\'s live controls. Whatever style you pick, keep these exact four so behavior matches the spec.');

/* interactivity: steppers + toggles + dials */
let n=3;
function paintVals(){document.querySelectorAll('[data-v]').forEach(el=>el.textContent=(el.classList.contains('mv')||el.classList.contains('val')&&el.closest('.miniloop'))?'×'+n:(el.classList.contains('mv')?'×'+n:n));
  document.querySelectorAll('.mv[data-v]').forEach(el=>el.textContent='×'+n);
  document.querySelectorAll('.val[data-v]').forEach(el=>el.textContent=n);}
document.addEventListener('click',e=>{
  const d=e.target.closest('[data-d]');
  if(d){n=Math.max(1,n+(+d.dataset.d));paintVals();}
  const set=e.target.closest('[data-set]');
  if(set){set.parentElement.querySelectorAll('.seg').forEach(x=>x.classList.remove('on'));set.classList.add('on');}
  const mode=e.target.closest('[data-mode]');
  if(mode){mode.parentElement.querySelectorAll('.seg').forEach(x=>x.classList.remove('on'));mode.classList.add('on');}
  const chip=e.target.closest('.c-chip');
  if(chip&&!e.target.closest('[data-d]')&&(chip.classList.contains('loop')||chip.classList.contains('cron')))chip.classList.toggle('on');
  const ib=e.target.closest('.ib.loop,.ib.cron');
  if(ib)ib.classList.toggle('on');
  const pr=e.target.closest('.preset');
  if(pr){pr.parentElement.querySelectorAll('.preset').forEach(x=>x.classList.remove('on'));pr.classList.add('on');}
});
paintVals();
</script>
</body>
</html>
