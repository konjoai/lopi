<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>lopi · the stack — center connectors × 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#0a0a0a;--deep:#050505;--paper:#f5f5f5;
  --ice:#00d4ff;--ice-deep:#0088aa;--ember:#ff4500;--flame:#ff9500;
  --jade:#00ff9d;--sun:#ffcc00;--rose:#ff0066;--teal:#00ffd4;
  --mist:rgba(255,255,255,.05);--veil:rgba(255,255,255,.11);
  --dim:rgba(245,245,245,.46);--dim2:rgba(245,245,245,.27);
  --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Space Grotesk',system-ui,sans-serif;
  --card:#0c0c0d;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--paper);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:0 14px 60px}
.top{position:sticky;top:0;z-index:20;background:rgba(10,10,10,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--mist);padding:12px 14px}
.brand{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px;margin-bottom:10px}
.brand b{color:var(--paper);font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ember);box-shadow:0 0 8px var(--ember);animation:pulse 2.6s ease-in-out infinite}
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:0 0 auto;font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;background:transparent;color:var(--dim);border:1px solid var(--veil);border-radius:3px;padding:8px 12px;cursor:pointer;white-space:nowrap;transition:.15s}
.tabs button.on{color:var(--black);background:var(--ice);border-color:var(--ice);font-weight:700}

.dock{display:flex;align-items:center;gap:12px;padding:16px 2px 14px}
.dock canvas{width:52px;height:52px;flex:0 0 52px}
.dock .di .p{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--flame)}
.dock .di .g{font-size:14px;font-weight:500;margin-top:2px}
.dock .di .m{font-family:var(--mono);font-size:10.5px;color:var(--dim);margin-top:3px}

.opt{display:none}.opt.on{display:block}
.qtitle{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim2);margin:6px 2px 14px;display:flex;justify-content:space-between}
.qtitle .nextl{color:var(--flame)}
.optnote{font-family:var(--mono);font-size:11px;color:var(--dim2);line-height:1.7;border-top:1px dashed var(--mist);margin-top:26px;padding-top:14px}
.optnote b{color:var(--dim);font-weight:500}

/* shared card + badges */
.pc{position:relative;background:var(--card);border:1px solid var(--veil);border-radius:5px;padding:12px 13px}
.pc.next{border-color:rgba(255,149,0,.5);box-shadow:0 0 0 1px rgba(255,69,0,.14),0 8px 26px rgba(255,69,0,.09)}
.pc.hold{border-style:dashed;opacity:.8}
.nexttag{position:absolute;top:-9px;right:10px;font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#160500;background:var(--ember);padding:2px 7px;border-radius:2px;font-weight:700}
.spec{font-family:var(--mono);font-size:12.5px;line-height:1.5;word-break:break-word}
.spec .al{color:var(--teal)} .spec .op{color:var(--flame);font-weight:700}
.spec .rp{color:var(--sun)} .spec .str{color:var(--paper)}
.bdg{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9.5px;border:1px solid;border-radius:3px;padding:2px 7px;margin:2px 4px 0 0}
.bdg svg{width:10px;height:10px}
.bdg.loop{color:var(--flame);border-color:rgba(255,149,0,.5)}
.bdg.cron{color:var(--ice);border-color:rgba(0,212,255,.5)}
.bdg.until{color:var(--jade);border-color:rgba(0,255,157,.45)}
.bdg.gate{color:var(--rose);border-color:rgba(255,0,102,.45)}
.bdg.hold{color:var(--sun);border-color:rgba(255,204,0,.5)}
.bdg.guard{color:var(--dim2);border-color:var(--veil);border-style:dashed}
.iterdots{display:flex;gap:4px;margin-top:8px}
.iterdots i{width:14px;height:3px;border-radius:2px;background:var(--veil)}
.iterdots i.done{background:var(--jade)}
.iterdots i.cur{background:var(--flame);box-shadow:0 0 6px var(--ember);animation:pulse 1.8s infinite}

/* center connector base */
.conn{position:relative;height:30px;display:flex;align-items:center;justify-content:center}
.conn .line{width:1px;height:100%;background:var(--veil)}

/* ---- 1 · ledger-center ---- */
.O1 .conn .line{background:linear-gradient(180deg,var(--veil),rgba(255,149,0,.4))}
.O1 .conn.tonext .line{background:linear-gradient(180deg,rgba(255,149,0,.4),var(--ember));box-shadow:0 0 8px rgba(255,69,0,.25)}
.O1 .conn .chev{position:absolute;bottom:2px;width:7px;height:7px;border-right:1px solid rgba(255,149,0,.65);border-bottom:1px solid rgba(255,149,0,.65);transform:rotate(45deg)}
.O1 .conn.dimup .line{background:var(--mist)}

/* ---- 2 · coil ---- */
.O2 .conn{height:38px}
.O2 .conn svg{position:absolute;height:100%;overflow:visible}
.O2 .conn.tonext svg path,.O2 .conn.tonext svg circle{filter:drop-shadow(0 0 4px rgba(255,69,0,.5))}
.O2 .turncap{position:absolute;right:calc(50% + 16px);top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--flame);text-transform:uppercase;white-space:nowrap}
.O2 .handcap{position:absolute;left:calc(50% + 14px);top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:9px;color:var(--dim2);letter-spacing:.06em;white-space:nowrap}

/* ---- 3 · flow ---- */
.O3 .conn{height:44px}
.O3 .conn .line{position:absolute;top:0;bottom:0;width:1px}
.O3 .conn.flow .line{background:linear-gradient(180deg,rgba(255,149,0,.15),rgba(255,69,0,.7))}
.O3 .conn.flow .pulse{position:absolute;left:50%;transform:translateX(-50%);top:-4px;width:5px;height:5px;border-radius:50%;background:var(--flame);box-shadow:0 0 10px var(--ember);animation:flowdown 2.2s linear infinite}
.O3 .conn.flow .pulse.p2{animation-delay:1.1s}
.O3 .conn.timed .line{background:none;border-left:1px dashed rgba(0,212,255,.55)}
.O3 .conn.blocked .line{background:none;border-left:1px dashed rgba(255,204,0,.55)}
.O3 .conn.blocked .line::after{content:"";position:absolute;top:calc(50% - 7px);left:-8px;width:15px;height:14px;background:var(--black)}
.O3 .conchip{position:relative;z-index:2;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;border:1px solid;border-radius:10px;padding:3px 10px;background:var(--black);display:flex;align-items:center;gap:5px}
.O3 .conchip.timed{color:var(--ice);border-color:rgba(0,212,255,.5)}
.O3 .conchip.blocked{color:var(--sun);border-color:rgba(255,204,0,.5)}
.O3 .conchip svg{width:10px;height:10px}
.O3 .pc .bdg.cron,.O3 .pc .bdg.hold{display:none} /* when/why-not lives on the line, not the card */

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes flowdown{0%{top:-4px;opacity:0}12%{opacity:1}88%{opacity:1}100%{top:calc(100% - 2px);opacity:0}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="top">
  <div class="brand"><span class="dot"></span>lopi <b>· center connectors</b> · 3 options</div>
  <div class="tabs" id="tabs"></div>
</div>
<div class="wrap">
  <div class="dock">
    <canvas id="dorb" width="52" height="52"></canvas>
    <div class="di">
      <div class="p">executing · implementation</div>
      <div class="g">Profile Metal fused-dequant kernel</div>
      <div class="m">↻ iter 2 · 86 tok/s · 61% ctx</div>
    </div>
  </div>
  <div id="opts"></div>
</div>

<script>
"use strict";
const REDUCED=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
const ICON_LOOP='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>';
const ICON_CRON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

const ITEMS=[
 {id:'prog', spec:[[':progress','al']], mods:' x3', loop:{n:3,done:1}},
 {id:'opt',  spec:[[':optimize','al']], mods:' gate:"./kill_test.sh" until:"cargo test"', gate:1, until:'cargo test'},
 {id:'bench',spec:[[':benchmark','al'],['@vectro','rp'],['>','op'],[':report','al'],['@konjo.ai','rp']], chain:true},
 {id:'kt',   spec:[[':kill-test','al']], mods:' at:"0 14 * * *" x2', cron:'0 14 * * *', cd:13500, loop:{n:2,done:0}},
 {id:'inf',  spec:[[':progress','al']], mods:' x∞ pace:even', inf:true, hold:'budget', resume:'~14:20'},
 {id:'hn',   spec:[['"draft HN post"','str']], lit:true},
];
function fmtCd(s){s=Math.max(0,s|0);const h=(s/3600)|0,m=((s%3600)/60)|0;return h?h+'h '+String(m).padStart(2,'0')+'m':m+'m '+String(s%60).padStart(2,'0')+'s';}
function specHTML(it){return '<span class="spec">'+it.spec.map(([t,c])=>`<span class="${c}">${t}</span>`).join(' ')+
  (it.mods?`<span style="color:var(--dim)">${it.mods.replace(/</g,'&lt;')}</span>`:'')+'</span>';}
function badges(it,implicit){
  let b='';
  if(it.loop)b+=`<span class="bdg loop">${ICON_LOOP}×${it.loop.n}</span>`;
  if(it.inf)b+=`<span class="bdg loop">${ICON_LOOP}∞</span>`;
  if(it.cron)b+=`<span class="bdg cron">${ICON_CRON}<span class="cdv" data-id="${it.id}">${fmtCd(it.cd)}</span></span>`;
  if(it.until)b+=`<span class="bdg until">until:"${it.until}"</span>`;
  if(it.gate)b+=`<span class="bdg gate">gate</span>`;
  if(it.hold)b+=`<span class="bdg hold">waiting · ${it.hold} · resumes ${it.resume}</span>`;
  if(implicit&&(it.inf||it.until))b+=`<span class="bdg guard">max:25</span><span class="bdg guard">budget:auto</span>`;
  return b?`<div style="margin-top:8px">${b}</div>`:'';
}
function iterDots(it){if(!it.loop||!it.loop.n)return '';
  let s='<div class="iterdots">';
  for(let i=0;i<it.loop.n;i++)s+=`<i class="${i<it.loop.done?'done':(i===it.loop.done?'cur':'')}"></i>`;
  return s+'</div>';}
function orb(cv,warm){const c=cv.getContext('2d');const dpr=Math.min(devicePixelRatio||1,2);
  const S=+cv.getAttribute('width');cv.width=S*dpr;cv.height=S*dpr;c.setTransform(dpr,0,0,dpr,0,0);
  const r=S/2-3,cx=S/2,cy=S/2;
  const g=c.createRadialGradient(cx-r*.3,cy-r*.3,1,cx,cy,r);
  g.addColorStop(0,'#0a94b8');g.addColorStop(.7,'#04212b');g.addColorStop(1,'#01080b');
  c.fillStyle=g;c.beginPath();c.arc(cx,cy,r,0,7);c.fill();
  c.globalCompositeOperation='screen';
  const f=c.createRadialGradient(cx+r*.2,cy+r*.25,1,cx+r*.1,cy+r*.2,r);
  f.addColorStop(0,`rgba(255,149,0,${.5+.4*warm})`);f.addColorStop(.5,'rgba(255,69,0,.3)');f.addColorStop(1,'rgba(255,69,0,0)');
  c.fillStyle=f;c.beginPath();c.arc(cx,cy,r,0,7);c.fill();
  c.globalCompositeOperation='source-over';
  c.strokeStyle='rgba(255,69,0,.9)';c.lineWidth=1.4;c.beginPath();c.arc(cx,cy,r-.5,0,7);c.stroke();}
orb(document.getElementById('dorb'),.6);

/* tabs / panes */
const OPTS=[{k:'O1',t:'1 · Ledger'},{k:'O2',t:'2 · Coil'},{k:'O3',t:'3 · Flow'}];
const optsEl=document.getElementById('opts'),tabsEl=document.getElementById('tabs');
const panes={};
OPTS.forEach((o,i)=>{
  const b=document.createElement('button');b.textContent=o.t;b.className=i===0?'on':'';
  b.onclick=()=>{[...tabsEl.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');
    Object.values(panes).forEach(p=>p.classList.remove('on'));panes[o.k].classList.add('on');};
  tabsEl.appendChild(b);
  const d=document.createElement('div');d.className='opt '+o.k+(i===0?' on':'');optsEl.appendChild(d);panes[o.k]=d;
});
const rev=[...ITEMS].reverse(); // top of stack first

/* ---- 1 · Ledger, center connectors ---- */
function render1(){
  let h='';
  rev.forEach((it,i)=>{
    const next=it===ITEMS[0];
    h+=`<div class="pc ${next?'next':''} ${it.hold?'hold':''}">${next?'<span class="nexttag">next</span>':''}
      ${specHTML(it)}${badges(it,true)}${iterDots(it)}</div>`;
    if(i<rev.length-1){
      const belowIsNext=rev[i+1]===ITEMS[0];
      const dim=it.hold; // connector out of a held card is inert
      h+=`<div class="conn ${belowIsNext?'tonext':''} ${dim?'dimup':''}"><div class="line"></div>${belowIsNext?'<div class="chev"></div>':''}</div>`;
    }
  });
  panes.O1.innerHTML=`<div class="qtitle"><span>↑ later</span><span class="nextl">next ↓</span></div>${h}
    <div class="optnote"><b>1 · Ledger · center line.</b> Your sketch, direct: full-width cards, a single centered connector segment between each pair. The connector warms as it approaches the bottom and grows a chevron into the next card. All state stays on the cards (badges, iteration ticks, implicit guards); the line is pure order.</div>`;
}

/* ---- 2 · Coil: loops wind the connector ---- */
function coilSVG(winds,chain){
  // vertical line with optional coil turns (loops) or a handoff node (chains)
  const W=44,H=38,cx=W/2;
  let s=`<svg width="${W}" viewBox="0 0 ${W} ${H}">`;
  if(winds>0){
    // spring: sine coils along the connector
    let d=`M ${cx} 0 `;const turns=Math.min(winds,3);const seg=H/(turns+1.4);
    let y=seg*0.5;d+=`L ${cx} ${y} `;
    for(let t=0;t<turns;t++){
      d+=`C ${cx+13} ${y+seg*0.15}, ${cx+13} ${y+seg*0.85}, ${cx} ${y+seg} `;
      d+=`C ${cx-13} ${y+seg*1.0}, ${cx-13} ${y+seg*0.3}, ${cx} ${y+seg*0.55} `;
      y+=seg*0.85;
    }
    d+=`L ${cx} ${H}`;
    s+=`<path d="${d}" fill="none" stroke="#ff9500" stroke-opacity=".8" stroke-width="1.3"/>`;
  } else {
    s+=`<line x1="${cx}" y1="0" x2="${cx}" y2="${H}" stroke="rgba(255,255,255,.16)" stroke-width="1"/>`;
  }
  if(chain)s+=`<rect x="${cx-3.5}" y="${H/2-3.5}" width="7" height="7" transform="rotate(45 ${cx} ${H/2})" fill="#0a0a0a" stroke="#00ffd4" stroke-width="1"/>`;
  s+='</svg>';return s;
}
function render2(){
  let h='';
  rev.forEach((it,i)=>{
    const next=it===ITEMS[0];
    h+=`<div class="pc ${next?'next':''} ${it.hold?'hold':''}">${next?'<span class="nexttag">next</span>':''}
      ${specHTML(it)}${badges(it,false)}${iterDots(it)}</div>`;
    if(i<rev.length-1){
      // the connector BELOW a card carries that card's loop winding: it must unwind before releasing downward
      const winds=it.loop?it.loop.n-(it.loop.done||0):(it.inf?3:0);
      const belowIsNext=rev[i+1]===ITEMS[0];
      h+=`<div class="conn ${belowIsNext?'tonext':''}">${coilSVG(winds,it.chain)}
        ${winds>0?`<span class="turncap">${it.inf?'∞':winds+' turn'+(winds>1?'s':'')} left</span>`:''}
        ${it.chain?'<span class="handcap">◆ handoff</span>':''}</div>`;
    }
  });
  panes.O2.innerHTML=`<div class="qtitle"><span>↑ later</span><span class="nextl">next ↓</span></div>${h}
    <div class="optnote"><b>2 · Coil.</b> The rasen idea living entirely in the connectors: a looped card's outgoing line is wound into a spring, one coil per remaining turn, and it visibly unwinds as iterations complete (:progress x3 with 1 done shows 2 coils). A chain's connector carries a teal ◆ handoff node: the artifact crossing between steps. The card stays clean; repetition is stored energy in the line.</div>`;
}

/* ---- 3 · Flow: the line explains when / why not ---- */
function render3(){
  let h='';
  rev.forEach((it,i)=>{
    const next=it===ITEMS[0];
    h+=`<div class="pc ${next?'next':''} ${it.hold?'hold':''}">${next?'<span class="nexttag">next</span>':''}
      ${specHTML(it)}${badges(it,false)}${iterDots(it)}</div>`;
    if(i<rev.length-1){
      const below=rev[i+1];
      // connector state derives from THIS card's gate to proceed downward
      let cls='flow',chip='';
      if(it.hold){cls='blocked';chip=`<span class="conchip blocked">⏸ budget · resumes ${it.resume}</span>`;}
      else if(it.cron){cls='timed';chip=`<span class="conchip timed">${ICON_CRON}<span class="cdv" data-id="${it.id}">${fmtCd(it.cd)}</span></span>`;}
      h+=`<div class="conn ${cls}"><div class="line"></div>
        ${cls==='flow'&&!REDUCED?'<div class="pulse"></div><div class="pulse p2"></div>':''}${chip}</div>`;
    }
  });
  panes.O3.innerHTML=`<div class="qtitle"><span>↑ later</span><span class="nextl">next ↓</span></div>${h}
    <div class="optnote"><b>3 · Flow.</b> A reassignment of meaning: the card says <b>what</b>, the connector says <b>when and why not</b>. Free-flowing segments run ember with pulses drifting toward execution; a time-gated card's line goes dashed cyan with the countdown chip sitting on the line itself; a budget-held card's line is physically broken with the ⏸ chip in the gap. You can read the whole queue's health without reading a single card, and cron/hold badges disappear from cards entirely because the line owns them.</div>`;
}

setInterval(()=>{
  ITEMS.forEach(it=>{if(it.cd!=null&&!REDUCED)it.cd--;});
  document.querySelectorAll('.cdv').forEach(el=>{
    const it=ITEMS.find(x=>x.id===el.dataset.id);
    if(it&&it.cd!=null)el.textContent=fmtCd(it.cd);
  });
},1000);

render1();render2();render3();
</script>
</body>
</html>
