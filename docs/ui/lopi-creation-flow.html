<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>lopi · loop creation flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#0b0e10;--panel:#0a0d0f;--card:#0e1214;--paper:#f5f5f5;
  --ice:#00d4ff;--ember:#ff4500;--flame:#ff9500;--jade:#00ff9d;--sun:#ffcc00;
  --rose:#ff2d78;--teal:#00ffd4;--violet:#b79bff;
  --mist:rgba(255,255,255,.05);--veil:rgba(255,255,255,.11);
  --dim:rgba(245,245,245,.46);--dim2:rgba(245,245,245,.28);
  --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060809;color:var(--paper);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh}
.top{padding:15px 20px;border-bottom:1px solid var(--mist);position:sticky;top:0;background:#060809;z-index:5}
.brand{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.brand b{color:var(--paper)}
.toggle{display:flex;gap:5px;flex-wrap:wrap}
.toggle span{padding:8px 13px;color:var(--dim);cursor:pointer;border:1px solid var(--veil);border-radius:6px;font-family:var(--mono);font-size:10.5px;transition:.14s}
.toggle span.on{background:rgba(0,212,255,.12);color:var(--ice);border-color:rgba(0,212,255,.4)}
.stage{max-width:520px;margin:0 auto;padding:26px 18px 90px}
.vt{font-family:var(--sans);font-size:16px;font-weight:600;margin-bottom:4px}
.vt .tag{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ice);border:1px solid rgba(0,212,255,.35);border-radius:20px;padding:2px 9px;margin-left:8px;vertical-align:middle}
.vd{font-family:var(--mono);font-size:11px;color:var(--dim);line-height:1.65;margin-bottom:20px}
.vd b{color:var(--paper)}

/* composer */
.composer{display:flex;align-items:center;gap:10px;border:1px solid var(--veil);border-radius:9px;padding:12px 14px;background:var(--card)}
.composer .ar{color:var(--flame);font-family:var(--mono);font-size:16px;flex:0 0 auto}
.composer input{flex:1;background:transparent;border:none;color:var(--paper);font-family:var(--mono);font-size:14px;outline:none;min-width:0}
.composer input::placeholder{color:var(--dim2)}
.composer .add{width:34px;height:34px;border:1px solid var(--veil);border-radius:7px;background:transparent;color:var(--dim2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.composer .add:hover{color:var(--flame);border-color:rgba(255,149,0,.4)}
.composer .add svg{width:16px;height:16px}

/* preset picker grid */
.presetgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
.pcard{border:1px solid var(--veil);border-radius:9px;padding:12px;cursor:pointer;transition:.14s;position:relative;overflow:hidden}
.pcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--dim2))}
.pcard:hover{border-color:var(--accent,var(--dim));transform:translateY(-1px)}
.pcard.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 7%,transparent)}
.pcard .pn{font-family:var(--mono);font-size:13px;color:var(--accent,var(--paper));display:flex;align-items:center;gap:7px;margin-bottom:5px}
.pcard .pn svg{width:14px;height:14px}
.pcard .pdesc{font-family:var(--mono);font-size:9.5px;color:var(--dim2);line-height:1.5;margin-bottom:8px}
.pcard .pev{font-family:var(--mono);font-size:8.5px;color:var(--jade);display:flex;align-items:center;gap:4px}
.pcard .pev svg{width:10px;height:10px}
.pcard .pev .n{color:var(--dim2)}

/* preset chips (inline, option B) */
.chiprow{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap;align-items:center}
.chiplabel{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim2);margin-right:2px}
.pchip{font-family:var(--mono);font-size:10.5px;color:var(--dim);border:1px solid var(--veil);border-radius:16px;padding:5px 11px;cursor:pointer;transition:.14s;display:inline-flex;align-items:center;gap:5px}
.pchip svg{width:11px;height:11px}
.pchip:hover{color:var(--paper)}
.pchip.on{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);border-color:color-mix(in srgb,var(--accent) 45%,transparent)}
.pchip.suggested{border-style:dashed;border-color:rgba(255,149,0,.45);color:var(--flame)}

/* selector row */
.selrow{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap}
.selrow.appear{animation:slidein .3s ease}
@keyframes slidein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.sel{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;color:var(--dim);border:1px solid var(--veil);border-radius:6px;padding:7px 11px;cursor:pointer;transition:.14s}
.sel svg{width:13px;height:13px}
.sel:hover{border-color:var(--dim)}
.sel .lb{color:var(--dim2);font-size:8px;letter-spacing:.06em;text-transform:uppercase}
.sel.model svg{color:var(--ice)} .sel.effort svg{color:var(--ember)} .sel.repo svg{color:var(--sun)} .sel.auto svg{color:var(--violet)}
.sel.auto{border-color:rgba(183,155,255,.3)}
.sel.auto .v{color:var(--violet)}

/* autonomy detail (the ladder) */
.autoladder{margin-top:11px;border:1px solid rgba(183,155,255,.25);border-radius:9px;padding:11px 13px;background:rgba(183,155,255,.03)}
.autoladder .ah{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--violet);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.autoladder .ah svg{width:12px;height:12px}
.rungs{display:flex;gap:5px}
.rung{flex:1;border:1px solid var(--veil);border-radius:7px;padding:8px 6px;cursor:pointer;text-align:center;transition:.14s}
.rung:hover{border-color:rgba(183,155,255,.4)}
.rung.on{border-color:var(--violet);background:rgba(183,155,255,.1)}
.rung .rl{font-family:var(--mono);font-size:11px;color:var(--paper);font-weight:700}
.rung .rn{font-family:var(--mono);font-size:8px;color:var(--dim2);margin-top:3px;line-height:1.3}
.rung.on .rn{color:var(--violet)}

/* the resulting loop card */
.conn{height:22px;display:flex;align-items:center;justify-content:center;margin-top:6px}.conn .l{width:2px;height:100%;background:linear-gradient(180deg,var(--veil),rgba(0,255,157,.4))}
.pc{position:relative;background:var(--card);border:1px solid rgba(0,255,157,.3);border-radius:9px;padding:13px 14px;animation:slidein .35s ease}
.pc .born{position:absolute;top:-9px;right:12px;font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--jade);background:var(--black);border:1px solid rgba(0,255,157,.4);border-radius:3px;padding:2px 7px}
.preset{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;border:1px solid;border-radius:12px;padding:2px 8px;margin-bottom:9px}
.preset svg{width:10px;height:10px}
.spec{font-family:var(--mono);font-size:13.5px;line-height:1.5;margin-bottom:9px}
.spec .al{color:var(--teal)} .spec .md{color:var(--dim)}
.cardbar{display:flex;align-items:center;gap:6px;padding-top:10px;border-top:1px solid var(--mist)}
.ib{height:28px;min-width:28px;padding:0 7px;border-radius:6px;border:1px solid var(--veil);background:transparent;color:var(--dim2);display:inline-flex;align-items:center;justify-content:center;gap:5px;font-family:var(--mono);font-size:10.5px}
.ib svg{width:13px;height:13px}
.ib.iter{border-color:rgba(255,149,0,.5);background:rgba(255,69,0,.09);color:var(--flame);font-weight:700}
.ib.guard{color:var(--sun);border-color:rgba(255,204,0,.35)}.ib.eval{color:var(--jade);border-color:rgba(0,255,157,.35)}
.ib .cnt{font-size:9px;font-weight:700}
.sp{flex:1}
.sumln{display:flex;align-items:center;gap:7px;margin-top:8px;font-family:var(--mono);font-size:9.5px;min-width:0}
.sumln .rl{display:inline-flex;align-items:center;gap:4px;letter-spacing:.08em;text-transform:uppercase;font-size:8px;flex:0 0 auto;width:52px}
.sumln .rl svg{width:11px;height:11px}
.sumln.guard .rl{color:var(--sun)} .sumln.eval .rl{color:var(--jade)}
.sumln .txt{color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.sumln.guard .txt b{color:var(--sun)} .sumln.eval .txt .p{color:var(--jade)}
.evalburst{margin-top:7px;font-family:var(--mono);font-size:9px;color:var(--jade);display:flex;flex-wrap:wrap;gap:4px}
.evalburst .eb{border:1px solid rgba(0,255,157,.26);border-radius:11px;padding:1px 8px;background:rgba(0,255,157,.05);animation:pop .3s ease backwards}
.evalburst .eb.base{border-style:dashed}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:none}}

.runbtn{margin-top:13px;width:100%;background:var(--flame);color:#160500;border:none;border-radius:8px;padding:11px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.runbtn svg{width:15px;height:15px}
.runbtn.dim{opacity:.35;pointer-events:none}

.step{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim2);margin:22px 0 8px}
.note{margin-top:22px;padding:13px 15px;border:1px solid var(--mist);border-left:2px solid var(--jade);border-radius:0 6px 6px 0;background:var(--panel);font-family:var(--mono);font-size:10.5px;color:var(--dim);line-height:1.7}
.note b{color:var(--paper)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="top">
  <div class="brand">lopi · <b>loop creation flow</b></div>
  <div class="toggle" id="toggle">
    <span class="on" data-v="preset">A · preset-first</span>
    <span data-v="type">B · type-first, inline preset</span>
    <span data-v="command">C · command bar</span>
  </div>
</div>
<div class="stage" id="stage"></div>

<script>
"use strict";
const I={
 plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
 loop:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>',
 clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
 shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v6c0 4-3 7-7 9-4-2-7-5-7-9V6z"/></svg>',
 checkbox:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
 cpu:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="1.5"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg>',
 gauge:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14l4-4"/><path d="M4 18a8 8 0 1 1 16 0"/></svg>',
 folder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
 ladder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v18M17 3v18M7 8h10M7 13h10M7 18h10"/></svg>',
 build:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.2L3 17.8 6.2 21l6.3-6.3a4 4 0 0 0 5.2-5.4l-2.6 2.6-2.1-2.1z"/></svg>',
 play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l14 8-14 8z"/></svg>',
 search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>',
 wrench:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.2L3 17.8 6.2 21l6.3-6.3a4 4 0 0 0 5.2-5.4l-2.6 2.6-2.1-2.1z"/></svg>',
 zap:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 10-12h-7z"/></svg>',
 chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>',
};
// preset catalog: each carries an eval suite
const PRESETS={
  research:{label:'research',icon:I.search,accent:'var(--ice)',desc:'gather + synthesize; grounded, non-hallucinated',evals:['execution ok','code review'],alias:':research'},
  implement:{label:'implement',icon:I.wrench,accent:'var(--flame)',desc:'build a feature; the full KCQF suite',evals:['execution ok','unit','integration','code review','vuln scan','adversarial'],alias:':implement'},
  optimize:{label:'optimize',icon:I.gauge,accent:'var(--sun)',desc:'improve a metric; statistical gate + anti-gaming',evals:['execution ok','beats-best','30-run gate','adversarial'],alias:':optimize'},
  ratchet:{label:'ratchet',icon:I.zap,accent:'var(--violet)',desc:'self-improve; keep only if it beats best',evals:['execution ok','beats-best','adversarial'],alias:':ratchet'},
  benchmark:{label:'benchmark',icon:I.chart,accent:'var(--teal)',desc:'measure; variance + CoV gate',evals:['execution ok','benchmark gate','30-run gate'],alias:':benchmark'},
};
const AUTONOMY=[
  {l:'L1',n:'writer · asks before acting'},
  {l:'L2',n:'director · acts, checks in'},
  {l:'L3',n:'advisor · runs, reports'},
  {l:'L4',n:'autonomous · only escalates'},
];
let view='preset';
let S={goal:'"add verifier gate to run_loop"',preset:null,auto:'L2',model:'Sonnet 4.6',effort:'High',repo:'lopi'};

function presetBlurb(p){return PRESETS[p]?`${PRESETS[p].evals.length} evals`:'';}
function evalBurst(p){
  if(!PRESETS[p])return '';
  return `<div class="evalburst">${PRESETS[p].evals.map((e,i)=>`<span class="eb ${i===0?'base':''}" style="animation-delay:${i*45}ms">${e}</span>`).join('')}</div>`;
}
function loopCard(){
  if(!S.preset)return '';
  const P=PRESETS[S.preset];
  return `<div class="conn"><div class="l"></div></div>
  <div class="pc">
    <span class="born">added to stack</span>
    <span class="preset" style="color:${P.accent};border-color:color-mix(in srgb,${P.accent} 40%,transparent)">${P.icon}${P.label}</span>
    <div class="spec"><span class="al">${P.alias}</span> <span class="md">${S.goal}</span></div>
    <div class="cardbar">
      <button class="ib iter">${I.loop}×3</button>
      <button class="ib">${I.clock}</button>
      <button class="ib guard">${I.shield}<span class="cnt">2</span></button>
      <button class="ib eval">${I.checkbox}<span class="cnt">${P.evals.length}</span></button>
      <span class="sp"></span>
    </div>
    <div class="sumln guard"><span class="rl">${I.shield}guards</span><span class="txt"><b>budget:auto</b> · <b>max 3</b></span></div>
    <div class="sumln eval"><span class="rl">${I.checkbox}evals</span><span class="txt"><span class="p">${P.evals.length} checks</span> · baseline + ${P.evals.length-1} more · from ${P.label} preset</span></div>
    ${evalBurst(S.preset)}
  </div>`;
}
function selectorRow(){
  return `<div class="selrow appear">
    <span class="sel model">${I.cpu}<span><span class="lb">model</span> ${S.model}</span></span>
    <span class="sel effort">${I.gauge}<span><span class="lb">effort</span> ${S.effort}</span></span>
    <span class="sel repo">${I.folder}<span><span class="lb">repo</span> ${S.repo}</span></span>
    <span class="sel auto" id="autoSel">${I.ladder}<span><span class="lb">autonomy</span> <span class="v">${S.auto}</span></span></span>
  </div>`;
}
function autoLadder(){
  return `<div class="autoladder"><div class="ah">${I.ladder}autonomy · how much leash</div>
    <div class="rungs">${AUTONOMY.map(a=>`<div class="rung ${a.l===S.auto?'on':''}" data-auto="${a.l}"><div class="rl">${a.l}</div><div class="rn">${a.n.split(' · ')[1]}</div></div>`).join('')}</div></div>`;
}

function renderPresetFirst(){
  return `<div class="vt">A · Preset-first <span class="tag">pick, then everything fills</span></div>
  <div class="vd">You pick <b>what kind of loop</b> first. Each preset card shows the eval suite it carries. Choosing one fills the composer, the selectors, and the eval suite in one move. Fewest decisions; the evals-come-with-the-preset idea is front and center.</div>
  <div class="step">1 · pick a preset</div>
  <div class="presetgrid">${Object.entries(PRESETS).map(([k,p])=>`
    <div class="pcard ${S.preset===k?'on':''}" data-preset="${k}" style="--accent:${p.accent}">
      <div class="pn">${p.icon}${p.label}</div>
      <div class="pdesc">${p.desc}</div>
      <div class="pev">${I.checkbox}<span>${p.evals.length} evals</span> <span class="n">· auto-attached</span></div>
    </div>`).join('')}</div>
  ${S.preset?`<div class="step">2 · your goal + settings</div>
    <div class="composer"><span class="ar">></span><input value=${JSON.stringify(S.goal)} id="goalIn"/><button class="add">${I.plus}</button></div>
    ${selectorRow()}
    ${S.showAuto?autoLadder():''}
    ${loopCard()}
    <button class="runbtn">${I.play} run stack</button>`:''}
  <div class="note"><b>Best for:</b> people who think "I want to <i>optimize</i> something" before they think about the exact words. The preset is the primary choice and it does the most work — it sets the alias, the evals, and sensible guard defaults. Risk: five preset cards is a wall if you just want to type a quick literal prompt.</div>`;
}
function renderTypeFirst(){
  const suggested=S.goal.toLowerCase().includes('gate')||S.goal.toLowerCase().includes('implement')?'implement':null;
  return `<div class="vt">B · Type-first, inline preset <span class="tag">type, then shape</span></div>
  <div class="vd">You type the goal first (the natural instinct), then a row of preset <b>chips</b> appears — one may be <b>suggested</b> from what you typed. Pick a chip to attach its evals, or leave it literal. Selectors sit below. Lower ceremony; typing is never blocked by a picker.</div>
  <div class="step">1 · type your goal</div>
  <div class="composer"><span class="ar">></span><input value=${JSON.stringify(S.goal)} id="goalIn"/><button class="add">${I.plus}</button></div>
  <div class="chiprow"><span class="chiplabel">as a</span>${Object.entries(PRESETS).map(([k,p])=>`<span class="pchip ${S.preset===k?'on':''} ${!S.preset&&suggested===k?'suggested':''}" data-preset="${k}" style="--accent:${p.accent}">${p.icon}${p.label}${!S.preset&&suggested===k?' · suggested':''}</span>`).join('')}<span class="pchip ${S.preset==='literal'?'on':''}" data-preset="literal" style="--accent:var(--dim)">literal</span></div>
  ${selectorRow()}
  ${S.showAuto?autoLadder():''}
  ${S.preset&&S.preset!=='literal'?loopCard():(S.preset==='literal'?literalCard():'')}
  <button class="runbtn ${S.preset?'':'dim'}">${I.play} run stack</button>
  <div class="note"><b>Best for:</b> the instinct to just start typing. The suggestion chip (dashed, ember) nudges toward a preset without forcing it — type "add verifier gate" and it suggests <i>implement</i>. Picking a chip attaches the evals. "literal" is always there for a plain prompt with just the baseline eval. This is the most forgiving flow.</div>`;
}
function literalCard(){
  return `<div class="conn"><div class="l"></div></div>
  <div class="pc" style="border-color:var(--veil)">
    <span class="born" style="color:var(--dim);border-color:var(--veil)">added to stack</span>
    <div class="spec"><span class="md">${S.goal}</span></div>
    <div class="cardbar">
      <button class="ib">${I.clock}</button>
      <button class="ib guard">${I.shield}<span class="cnt">2</span></button>
      <button class="ib eval">${I.checkbox}<span class="cnt">1</span></button>
      <span class="sp"></span>
    </div>
    <div class="sumln eval"><span class="rl">${I.checkbox}evals</span><span class="txt"><span class="p">1 check</span> · baseline only · add your own</span></div>
  </div>`;
}
function renderCommand(){
  const typed=S.cmdTyped||':optimize "improve INT3 dequant" @squish';
  return `<div class="vt">C · Command bar <span class="tag">one line, everything inline</span></div>
  <div class="vd">A single command bar. Type a <b>:alias</b> and it auto-recognizes the preset (attaching evals), <b>@repo</b> sets the repo, modifiers like <b>x3</b> set the loop. Selectors appear as a compact row for anything not typed. Power-user speed; the whole loop in one line.</div>
  <div class="step">type a command</div>
  <div class="composer"><span class="ar">></span><input value=${JSON.stringify(typed)} id="cmdIn"/><button class="add">${I.plus}</button></div>
  <div class="chiprow"><span class="chiplabel">parsed</span>
    <span class="pchip on" style="--accent:var(--sun)">${I.gauge}optimize</span>
    <span class="pchip on" style="--accent:var(--sun)">${I.folder}@squish</span>
    <span class="pchip on" style="--accent:var(--flame)">${I.loop}×3</span>
    <span class="pchip on" style="--accent:var(--jade)">${I.checkbox}4 evals</span>
  </div>
  ${selectorRow()}
  ${S.showAuto?autoLadder():''}
  <div class="conn"><div class="l"></div></div>
  <div class="pc">
    <span class="born">parsed → stack</span>
    <span class="preset" style="color:var(--sun);border-color:rgba(255,204,0,.4)">${I.gauge}optimize</span>
    <div class="spec"><span class="al">:optimize</span> <span class="md">"improve INT3 dequant" @squish x3</span></div>
    <div class="cardbar">
      <button class="ib iter">${I.loop}×3</button><button class="ib">${I.clock}</button>
      <button class="ib guard">${I.shield}<span class="cnt">2</span></button>
      <button class="ib eval">${I.checkbox}<span class="cnt">4</span></button><span class="sp"></span>
    </div>
    <div class="sumln guard"><span class="rl">${I.shield}guards</span><span class="txt"><b>budget:auto</b> · <b>max 3</b></span></div>
    <div class="sumln eval"><span class="rl">${I.checkbox}evals</span><span class="txt"><span class="p">4 checks</span> · from optimize preset</span></div>
    ${evalBurst('optimize')}
  </div>
  <button class="runbtn">${I.play} run stack</button>
  <div class="note"><b>Best for:</b> you, honestly — once fluent, the whole loop is one line and the same string works in the CLI and Telegram. The parsed chips confirm what lopi understood (preset, repo, loop count, evals) so the magic isn't hidden. Risk: discoverability — a newcomer doesn't know the grammar exists. Best paired with A or B as the beginner path and this as the fast path.</div>`;
}

function render(){
  const s=document.getElementById('stage');
  s.innerHTML=(view==='preset')?renderPresetFirst():(view==='type')?renderTypeFirst():renderCommand();
  // wire preset cards / chips
  s.querySelectorAll('[data-preset]').forEach(el=>el.onclick=()=>{S.preset=el.dataset.preset;render();});
  const goalIn=s.querySelector('#goalIn');if(goalIn)goalIn.oninput=()=>{S.goal='"'+goalIn.value.replace(/^"|"$/g,'')+'"';};
  const autoSel=s.querySelector('#autoSel');if(autoSel)autoSel.onclick=()=>{S.showAuto=!S.showAuto;render();};
  s.querySelectorAll('[data-auto]').forEach(r=>r.onclick=()=>{S.auto=r.dataset.auto;render();});
}
document.querySelectorAll('#toggle span').forEach(sp=>sp.onclick=()=>{view=sp.dataset.v;S.preset=(view==='preset')?null:S.preset;S.showAuto=false;document.querySelectorAll('#toggle span').forEach(x=>x.classList.toggle('on',x.dataset.v===view));render();});
render();
</script>
</body>
</html>
