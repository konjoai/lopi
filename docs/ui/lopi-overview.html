<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>lopi · overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#0b0e10;--panel:#0a0d0f;--card:#0e1214;--paper:#f5f5f5;
  --ice:#00d4ff;--ice-deep:#0a8aa8;--ember:#ff4500;--flame:#ff9500;
  --jade:#00ff9d;--sun:#ffcc00;--rose:#ff2d78;--teal:#00ffd4;--violet:#b79bff;
  --mist:rgba(255,255,255,.05);--veil:rgba(255,255,255,.11);
  --dim:rgba(245,245,245,.46);--dim2:rgba(245,245,245,.28);
  --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Space Grotesk',system-ui,sans-serif;
  --sbar:#161a1c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#070a0c;color:var(--paper);font-family:var(--sans);-webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* top bar */
.top{flex:0 0 auto;padding:14px 22px;border-bottom:1px solid var(--mist);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px}
.brand b{color:var(--paper)} .brand .glyph{color:var(--flame);display:flex}.brand .glyph svg{width:15px;height:15px}
/* global stats */
.stats{display:flex;gap:6px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--dim);border:1px solid var(--veil);border-radius:16px;padding:5px 11px}
.stat b{color:var(--paper);font-weight:700}
.stat .d{width:7px;height:7px;border-radius:50%}
.stat.run .d{background:var(--flame);box-shadow:0 0 7px var(--ember);animation:pulse 1.8s infinite}
.stat.sch .d{background:var(--ice)} .stat.wait .d{background:var(--sun)}
.stat.need{border-color:rgba(255,45,120,.5);color:var(--rose)} .stat.need .d{background:var(--rose);box-shadow:0 0 7px var(--rose)} .stat.need b{color:var(--rose)}
.stat.burn{margin-left:2px} .stat.burn b{color:var(--sun)}
/* view toggle */
.toggle{margin-left:auto;display:inline-flex;border:1px solid var(--veil);border-radius:6px;overflow:hidden;font-family:var(--mono);font-size:11px}
.toggle span{padding:7px 14px;color:var(--dim);cursor:pointer;display:flex;align-items:center;gap:6px;border-right:1px solid var(--veil)}
.toggle span:last-child{border-right:none}.toggle span svg{width:13px;height:13px}
.toggle span.on{background:rgba(0,212,255,.13);color:var(--ice)}
.needsonly{font-family:var(--mono);font-size:10px;color:var(--dim2);border:1px solid var(--veil);border-radius:16px;padding:6px 11px;cursor:pointer;display:flex;align-items:center;gap:6px}
.needsonly.on{color:var(--rose);border-color:rgba(255,45,120,.5);background:rgba(255,45,120,.07)}

.body{flex:1;overflow-y:auto;padding:20px 22px 60px;min-height:0}
.body::-webkit-scrollbar{width:9px}.body::-webkit-scrollbar-track{background:transparent}
.body::-webkit-scrollbar-thumb{background:var(--sbar);border-radius:4px}
.body{scrollbar-width:thin;scrollbar-color:var(--sbar) transparent}

/* ---------- stack card (shared by both views) ---------- */
.scard{background:var(--card);border:1px solid var(--veil);border-radius:8px;padding:12px 13px;cursor:pointer;transition:.14s;position:relative;overflow:hidden}
.scard:hover{border-color:var(--dim);transform:translateY(-1px)}
.scard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--dim2)}
.scard.running::before{background:var(--flame);box-shadow:0 0 10px rgba(255,69,0,.3)}
.scard.scheduled::before{background:var(--ice)} .scard.waiting::before{background:var(--sun)}
.scard.needs::before{background:var(--rose);box-shadow:0 0 10px rgba(255,45,120,.4)}
.scard.done::before{background:var(--jade)} .scard.idle::before{background:var(--dim2)}
.scard.needs{border-color:rgba(255,45,120,.4)}
.stop{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.repo{font-family:var(--mono);font-size:11px;color:var(--sun);font-weight:500}
.wf{font-family:var(--mono);font-size:9px;color:var(--dim2);letter-spacing:.04em}
.schip{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;border-radius:3px;padding:2px 7px;border:1px solid}
.schip svg{width:9px;height:9px}
.schip.running{color:var(--flame);border-color:rgba(255,149,0,.5)}
.schip.scheduled{color:var(--ice);border-color:rgba(0,212,255,.45)}
.schip.waiting{color:var(--sun);border-color:rgba(255,204,0,.45)}
.schip.needs{color:var(--rose);border-color:rgba(255,45,120,.5);background:rgba(255,45,120,.08)}
.schip.done{color:var(--jade);border-color:rgba(0,255,157,.4)}
.schip.idle{color:var(--dim2);border-color:var(--veil)}
.scur{font-family:var(--mono);font-size:12.5px;color:var(--teal);margin-bottom:8px;word-break:break-word}
.scur .arg{color:var(--paper)} .scur .rp{color:var(--sun)} .scur .op{color:var(--flame);font-weight:700}
.sctx{font-family:var(--mono);font-size:10px;color:var(--dim);min-height:16px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
/* running progress */
.prog{display:flex;gap:3px}.prog i{width:15px;height:3px;border-radius:2px;background:var(--veil)}
.prog i.done{background:var(--jade)}.prog i.cur{background:var(--flame);box-shadow:0 0 5px var(--ember);animation:pulse 1.7s infinite}
.act{color:var(--dim2);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.act .k{color:var(--violet);font-style:normal}
.reason{color:var(--rose)} .reason b{color:var(--paper)}
.gate-r{color:var(--rose)} .verdict{color:var(--jade)}
.nexttime{color:var(--ice)} .held{color:var(--sun)}
.sfoot{display:flex;align-items:center;gap:8px;margin-top:9px;padding-top:8px;border-top:1px solid var(--mist);font-family:var(--mono);font-size:9px;color:var(--dim2)}
.sfoot .mdl{color:var(--ice)} .sfoot .eff{color:var(--flame)} .sfoot .burn{margin-left:auto}
.sfoot .burn b{color:var(--sun)}

/* ---------- VIEW: by project ---------- */
.proj{margin-bottom:26px}
.phead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.phead .pname{font-family:var(--sans);font-size:16px;font-weight:600}
.phead .pdots{display:flex;gap:4px}
.phead .pdots i{width:7px;height:7px;border-radius:50%}
.phead .pcount{font-family:var(--mono);font-size:10px;color:var(--dim2);letter-spacing:.04em}
.phead .pline{flex:1;height:1px;background:var(--mist)}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}

/* ---------- VIEW: by state (board) ---------- */
.board{display:grid;grid-template-columns:repeat(4,minmax(230px,1fr));gap:16px;align-items:start}
.col{display:flex;flex-direction:column;gap:11px}
.chead{display:flex;align-items:center;gap:8px;position:sticky;top:0;padding:2px 0 10px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase}
.chead .cn{margin-left:auto;font-size:11px;color:var(--dim2)}
.chead.needs{color:var(--rose)} .chead.running{color:var(--flame)} .chead.timed{color:var(--ice)} .chead.done{color:var(--jade)}
.chead .cdot{width:7px;height:7px;border-radius:50%}
.chead.needs .cdot{background:var(--rose);box-shadow:0 0 7px var(--rose)}
.chead.running .cdot{background:var(--flame);box-shadow:0 0 7px var(--ember)}
.chead.timed .cdot{background:var(--ice)} .chead.done .cdot{background:var(--jade)}
.col .empty{font-family:var(--mono);font-size:10px;color:var(--dim2);border:1px dashed var(--veil);border-radius:7px;padding:14px;text-align:center}
/* in board view, repo badge more prominent since cross-project */
.board .scard .repo{color:var(--sun)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--panel);border:1px solid var(--veil);border-radius:6px;padding:10px 16px;font-family:var(--mono);font-size:11px;color:var(--paper);opacity:0;transition:.25s;z-index:50;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast b{color:var(--ice)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media (max-width:900px){.board{grid-template-columns:1fr 1fr}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="top">
  <div class="brand"><span class="glyph" id="glyph"></span>lopi <b>· overview</b></div>
  <div class="stats" id="stats"></div>
  <span class="needsonly" id="needsonly">▲ needs you only</span>
  <span class="toggle" id="toggle">
    <span class="on" data-v="project"></span>
    <span data-v="state"></span>
  </span>
</div>
<div class="body" id="view"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const I={
 blocks:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="8" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>',
 grid:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
 cols:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="18" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>',
 run:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l14 8-14 8z"/></svg>',
 clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
 pause:'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>',
 alert:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17h.01"/></svg>',
 check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
 idle:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/></svg>',
};
// state metadata
const ST={
 running:{label:'running',icon:I.run},
 scheduled:{label:'scheduled',icon:I.clock},
 waiting:{label:'held',icon:I.pause},
 needs:{label:'needs you',icon:I.alert},
 done:{label:'done',icon:I.check},
 idle:{label:'idle',icon:I.idle},
};

/* the running work across the portfolio */
const STACKS=[
 {id:'s1',repo:'squish',wf:'launch benchmark',cur:':optimize',state:'running',iter:[2,3],model:'Sonnet 4.6',effort:'Med',act:'<span class="k">tool</span> ./bench_v5.py — paired Wilcoxon',tok:41,bud:200},
 {id:'s2',repo:'squish',wf:'launch benchmark',cur:':kill-test',state:'scheduled',next:'02:00',model:'Sonnet 4.6',effort:'Med'},
 {id:'s3',repo:'squish',wf:'article',cur:'"draft HN launch post"',state:'idle',model:'Opus 4.8',effort:'High'},
 {id:'s4',repo:'vectro',wf:'OPQ compression',cur:':optimize',state:'needs',reason:'verifier',detail:'OPQ ratio regressed 32→28×',model:'Opus 4.8',effort:'High',tok:88,bud:200},
 {id:'s5',repo:'vectro',cur:':benchmark',state:'running',iter:[1,2],model:'Sonnet 4.6',effort:'Med',act:'<span class="k">thinking</span> planning the NEON distance path',tok:12,bud:200},
 {id:'s6',repo:'lopi',wf:'verifier gate sprint',cur:':implement',state:'running',iter:[3,5],model:'Sonnet 4.6',effort:'High',act:'<span class="k">action</span> editing runner/mod.rs',tok:63,bud:200},
 {id:'s7',repo:'lopi',cur:'test {repo} until {cmd}',state:'waiting',reason:'budget',model:'Sonnet 4.6',effort:'Med'},
 {id:'s8',repo:'kiban',wf:'phase 7',cur:':kiban-sprint',state:'needs',reason:'gate',detail:'./kill_test.sh exited 1',model:'Opus 4.8',effort:'High'},
 {id:'s9',repo:'drex',cur:':research',state:'done',verdict:'merged · +0.12 PPL',model:'Opus 4.8',effort:'High',tok:120},
 {id:'s10',repo:'squish',cur:':progress',state:'running',iter:[1,null],model:'Sonnet 4.6',effort:'Med',act:'<span class="k">thinking</span> reading PROGRESS.md',tok:7,bud:200},
 {id:'s11',repo:'kohaku',cur:':scope',state:'idle',model:'Sonnet 4.6',effort:'Med'},
 {id:'s12',repo:'vectro',cur:':handoff',state:'done',verdict:'HANDOFF written',model:'Haiku 4.5',effort:'Low'},
];

let view='project', needsOnly=false;

function promptHTML(s){
  let h=s.cur.startsWith(':')?`${s.cur.split(' ')[0]}`:s.cur;
  h=h.replace(/^(:[a-z-]+)/,'$1');
  // color the alias vs args
  if(s.cur.startsWith(':')){const parts=s.cur.split(' ');h=parts[0]+(parts.length>1?` <span class="arg">${parts.slice(1).join(' ')}</span>`:'');}
  else h=`<span class="arg">${s.cur}</span>`;
  return h;
}
function ctxHTML(s){
  if(s.state==='running'){
    let dots='';const[c,n]=s.iter;const total=n||3;for(let i=0;i<total;i++)dots+=`<i class="${i<c-1?'done':(i===c-1?'cur':'')}"></i>`;
    const label=n?`iter ${c}/${n}`:`iter ${c}/∞`;
    return `<span class="prog">${dots}</span><span style="color:var(--flame)">${label}</span> <span class="act">${s.act||''}</span>`;
  }
  if(s.state==='scheduled')return `<span class="nexttime">${I.clock.replace('width="9"','')} next · ${s.next}</span>`.replace('<svg','<svg style="width:10px;height:10px;vertical-align:-1px"');
  if(s.state==='waiting')return `<span class="held">held · budget · will resume when window clears</span>`;
  if(s.state==='needs'){
    const r=s.reason==='verifier'?'verifier failed':(s.reason==='gate'?'gate blocked':'needs input');
    return `<span class="reason">▲ <b>${r}</b> · ${s.detail||''}</span>`;
  }
  if(s.state==='done')return `<span class="verdict">✓ ${s.verdict||'done'}</span>`;
  if(s.state==='idle')return `<span style="color:var(--dim2)">staged · not started</span>`;
  return '';
}
function card(s){
  const burn=s.tok?`<span class="burn"><b>${s.tok}k</b>${s.bud?' / '+s.bud+'k':''}</span>`:'';
  return `<div class="scard ${s.state}" data-open="${s.id}">
    <div class="stop"><span class="repo">${s.repo}</span>${s.wf?`<span class="wf">· ${s.wf}</span>`:''}<span class="schip ${s.state}">${ST[s.state].icon}${ST[s.state].label}</span></div>
    <div class="scur">${promptHTML(s)}</div>
    <div class="sctx">${ctxHTML(s)}</div>
    <div class="sfoot"><span class="mdl">${s.model}</span><span class="eff">${s.effort}</span>${burn}</div>
  </div>`;
}

function stats(){
  const c=k=>STACKS.filter(s=>s.state===k).length;
  const burn=STACKS.reduce((a,s)=>a+(s.tok||0),0);
  return `<span class="stat run"><span class="d"></span><b>${c('running')}</b> running</span>
    <span class="stat sch"><span class="d"></span><b>${c('scheduled')}</b> scheduled</span>
    <span class="stat wait"><span class="d"></span><b>${c('waiting')}</b> held</span>
    <span class="stat need"><span class="d"></span><b>${c('needs')}</b> need you</span>
    <span class="stat burn">⛁ <b>${burn}k</b> tok live</span>`;
}

function render(){
  document.getElementById('stats').innerHTML=stats();
  const data=needsOnly?STACKS.filter(s=>s.state==='needs'):STACKS;
  const el=document.getElementById('view');
  if(view==='project'){
    // group by repo, order: repos with needs first, then by running count
    const repos=[...new Set(data.map(s=>s.repo))];
    const score=r=>{const rs=data.filter(s=>s.repo===r);return (rs.some(s=>s.state==='needs')?1000:0)+rs.filter(s=>s.state==='running').length*10+rs.length;};
    repos.sort((a,b)=>score(b)-score(a));
    el.innerHTML=repos.map(r=>{
      const rs=data.filter(s=>s.repo===r);
      const dots=['running','needs','scheduled','waiting','done','idle'].filter(k=>rs.some(s=>s.state===k))
        .map(k=>`<i style="background:var(--${k==='running'?'flame':k==='needs'?'rose':k==='scheduled'?'ice':k==='waiting'?'sun':k==='done'?'jade':'dim2'})"></i>`).join('');
      const summ=[];const rc=rs.filter(s=>s.state==='running').length;const nc=rs.filter(s=>s.state==='needs').length;
      if(rc)summ.push(`${rc} running`);if(nc)summ.push(`${nc} need you`);summ.push(`${rs.length} total`);
      return `<div class="proj">
        <div class="phead"><span class="pname">${r}</span><span class="pdots">${dots}</span><span class="pcount">${summ.join(' · ')}</span><span class="pline"></span></div>
        <div class="pgrid">${rs.map(card).join('')}</div>
      </div>`;
    }).join('');
  } else {
    // board: columns by state group. Needs first (triage), then running, then timed(scheduled+waiting), then done
    const cols=[
      {key:'needs',cls:'needs',label:'needs you',states:['needs']},
      {key:'running',cls:'running',label:'running',states:['running']},
      {key:'timed',cls:'timed',label:'scheduled · held',states:['scheduled','waiting','idle']},
      {key:'done',cls:'done',label:'done',states:['done']},
    ];
    el.innerHTML=`<div class="board">${cols.map(col=>{
      const items=data.filter(s=>col.states.includes(s.state));
      const body=items.length?items.map(card).join(''):`<div class="empty">nothing here</div>`;
      return `<div class="col"><div class="chead ${col.cls}"><span class="cdot"></span>${col.label}<span class="cn">${items.length}</span></div>${body}</div>`;
    }).join('')}</div>`;
  }
  wire();
}
function wire(){
  document.querySelectorAll('[data-open]').forEach(c=>c.onclick=()=>{const s=STACKS.find(x=>x.id===c.dataset.open);toast(`→ opening <b>${s.repo}</b> · ${s.cur.split(' ')[0]} stack`);});
}
let tt;function toast(m){const t=document.getElementById('toast');t.innerHTML=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1900);}

document.getElementById('toggle').querySelector('[data-v=project]').innerHTML=I.grid+' by project';
document.getElementById('toggle').querySelector('[data-v=state]').innerHTML=I.cols+' by state';
document.querySelectorAll('#toggle span').forEach(sp=>sp.onclick=()=>{view=sp.dataset.v;document.querySelectorAll('#toggle span').forEach(x=>x.classList.toggle('on',x.dataset.v===view));render();});
document.getElementById('needsonly').onclick=()=>{needsOnly=!needsOnly;document.getElementById('needsonly').classList.toggle('on',needsOnly);render();};
document.getElementById('glyph').innerHTML=I.blocks;
render();
</script>
</body>
</html>
