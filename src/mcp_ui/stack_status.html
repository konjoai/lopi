<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>lopi stack status</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1a1a1a;
    --bg: #ffffff;
    --border: #e2e2e2;
    --muted: #6b6b6b;
    --head-bg: #f6f6f7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #e8e8e8;
      --bg: #1c1c1e;
      --border: #3a3a3c;
      --muted: #9a9a9e;
      --head-bg: #2a2a2c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 12px;
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--fg);
    background: var(--bg);
  }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  th {
    background: var(--head-bg);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--muted);
  }
  td.goal { max-width: 320px; }
  td.branch, td.stage {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
  }
  .empty { color: var(--muted); padding: 8px 0; }
  .stage-running { color: #0a7d3c; font-weight: 600; }
  .stage-planning, .stage-implement, .stage-test, .stage-score { color: #0a5cd8; }
  .stage-queued { color: var(--muted); }
</style>
</head>
<body>
<div id="root"><p class="empty">Waiting for lopi…</p></div>
<script>
(function () {
  "use strict";

  // Minimal MCP Apps (SEP-1865) client lifecycle: request the host for the
  // structured result of the tool call this widget is bound to
  // (lopi_get_stack_status), then listen for pushed updates when that tool
  // is called again. Read-only v1 — this widget never calls a tool itself.
  var nextId = 1;
  var initId = nextId++;

  function post(method, params, id) {
    var msg = { jsonrpc: "2.0", method: method };
    if (params !== undefined) msg.params = params;
    if (id !== undefined) msg.id = id;
    window.parent.postMessage(msg, "*");
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function render(data) {
    var root = document.getElementById("root");
    var tasks = (data && data.tasks) || [];
    if (!tasks.length) {
      root.innerHTML = '<p class="empty">No lopi tasks yet.</p>';
      return;
    }
    var rows = tasks
      .map(function (t) {
        var stage = t.stage || "";
        return (
          "<tr>" +
          '<td class="goal">' + escapeHtml(t.goal) + "</td>" +
          '<td class="branch">' + escapeHtml(t.branch || "—") + "</td>" +
          '<td class="stage stage-' + escapeHtml(stage) + '">' + escapeHtml(stage) + "</td>" +
          '<td class="status">' + escapeHtml(t.status) + "</td>" +
          "</tr>"
        );
      })
      .join("");
    root.innerHTML =
      "<table><thead><tr><th>Task</th><th>Branch</th><th>Stage</th><th>Status</th></tr></thead>" +
      "<tbody>" + rows + "</tbody></table>";
  }

  // Structured data can arrive shaped as the raw tool result, or nested
  // under `structuredContent`/`toolResult` depending on how the host wraps
  // it — accept any of the three rather than assuming one exact shape.
  function unwrap(payload) {
    if (!payload) return payload;
    return payload.structuredContent || payload.toolResult || payload;
  }

  window.addEventListener("message", function (event) {
    var msg = event.data;
    if (!msg || typeof msg !== "object") return;

    if (msg.id === initId && (msg.result || msg.error)) {
      if (msg.result) {
        render(unwrap(msg.result));
        post("ui/notifications/initialized");
      }
      return;
    }

    if (msg.method === "ui/notifications/tool-result") {
      render(unwrap(msg.params));
    }
  });

  post("ui/initialize", {}, initId);
})();
</script>
</body>
</html>
