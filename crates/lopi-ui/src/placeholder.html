<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lopi · Forge</title>
  <style>
    :root {
      --bg-0: #0a0a10;
      --bg-1: #11111b;
      --bg-2: #1a1a26;
      --bg-3: #252535;
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.16);
      --fg: #f5f5f7;
      --fg-dim: rgba(245, 245, 247, 0.62);
      --fg-mute: rgba(245, 245, 247, 0.36);
      --konjo: #7c3aed;
      --konjo-dim: rgba(124, 58, 237, 0.55);
      --konjo-soft: rgba(124, 58, 237, 0.16);
      --ok: #22c55e;
      --warn: #eab308;
      --err: #ef4444;
      --info: #f5f5f7;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background:
        radial-gradient(circle at 18% 20%, rgba(124, 58, 237, 0.10) 0%, transparent 45%),
        radial-gradient(circle at 82% 80%, rgba(124, 58, 237, 0.06) 0%, transparent 45%),
        var(--bg-0);
      color: var(--fg);
      font-family: var(--sans);
      letter-spacing: -0.011em;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 280px 1fr 360px;
      grid-template-areas:
        "topbar topbar topbar"
        "queue  grid   log"
        "stats  stats  stats";
      height: 100vh;
      gap: 1px;
      background: var(--line);
    }

    /* TOP BAR */
    .topbar {
      grid-area: topbar;
      background: var(--bg-1);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--line);
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 1rem; letter-spacing: -0.02em;
    }
    .brand .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--konjo);
      box-shadow: 0 0 12px rgba(124, 58, 237, 0.7);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .brand .tag {
      font-family: var(--mono);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--fg-mute);
      margin-left: 4px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.25); opacity: 0.75; }
    }

    .submit {
      display: flex; align-items: center; gap: 8px;
      flex: 1;
    }
    .submit textarea {
      flex: 1;
      background: var(--bg-2);
      color: var(--fg);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: var(--sans);
      font-size: 0.875rem;
      resize: none;
      height: 36px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .submit textarea:focus {
      outline: none;
      border-color: var(--konjo);
      box-shadow: 0 0 0 3px var(--konjo-soft);
    }
    .submit select {
      background: var(--bg-2);
      color: var(--fg);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      height: 36px;
      cursor: pointer;
    }
    .submit button {
      background: var(--konjo);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0 18px;
      height: 36px;
      font-family: var(--mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
    }
    .submit button:hover { background: #6d28d9; }
    .submit button:active { transform: translateY(1px); }
    .submit button:disabled { opacity: 0.5; cursor: not-allowed; }

    .conn {
      font-family: var(--mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      display: flex; align-items: center; gap: 6px;
      color: var(--fg-mute);
    }
    .conn .led {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--err);
    }
    .conn.live .led { background: var(--ok); box-shadow: 0 0 8px rgba(34, 197, 94, 0.7); }

    /* PANEL — generic */
    .panel {
      background: var(--bg-1);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .panel-h {
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--fg-mute);
      border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-h .count {
      background: var(--konjo-soft);
      color: var(--konjo);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
    }
    .panel-body { flex: 1; overflow-y: auto; padding: 8px; }

    .panel-body::-webkit-scrollbar { width: 8px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb {
      background: var(--bg-3); border-radius: 4px;
    }

    /* QUEUE */
    .queue { grid-area: queue; }
    .task-row {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.1s ease;
      border: 1px solid transparent;
    }
    .task-row:hover { background: var(--bg-2); }
    .task-row.selected {
      background: var(--konjo-soft);
      border-color: var(--konjo-dim);
    }
    .task-row .goal {
      font-size: 0.82rem;
      line-height: 1.35;
      color: var(--fg);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .task-row .meta {
      margin-top: 6px;
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--fg-mute);
      display: flex; justify-content: space-between;
    }

    /* AGENT GRID */
    .grid-area {
      grid-area: grid;
      background: var(--bg-0);
      display: flex; flex-direction: column;
      min-height: 0;
    }
    .grid-h {
      padding: 12px 20px;
      font-family: var(--mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--fg-mute);
      border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center;
    }
    .grid-body {
      flex: 1; overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      grid-auto-rows: min-content;
      gap: 12px;
      align-content: start;
    }
    .grid-empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--fg-mute);
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 80px 0;
    }

    .agent {
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      position: relative;
      overflow: hidden;
    }
    .agent::before {
      content: "";
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(180deg, var(--konjo-soft) 0%, transparent 30%);
      opacity: 0.7;
    }
    .agent-h { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .agent-goal {
      font-size: 0.85rem;
      line-height: 1.4;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      position: relative;
    }
    .pill {
      font-family: var(--mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pill.running { background: var(--konjo-soft); color: var(--konjo); }
    .pill.success { background: rgba(34, 197, 94, 0.15); color: var(--ok); }
    .pill.failed { background: rgba(239, 68, 68, 0.15); color: var(--err); }
    .pill.queued { background: rgba(255, 255, 255, 0.06); color: var(--fg-dim); }

    .agent-meta {
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 0.66rem;
      color: var(--fg-mute);
      display: flex; gap: 12px;
      position: relative;
    }
    .score-bar {
      margin-top: 10px;
      height: 4px;
      background: var(--bg-3);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .score-bar > span {
      display: block; height: 100%;
      background: linear-gradient(90deg, var(--konjo) 0%, #a78bfa 100%);
      width: 0;
      transition: width 0.4s ease;
    }
    .agent-actions {
      margin-top: 10px;
      display: flex; gap: 6px;
      position: relative;
    }
    .btn-cancel {
      background: transparent;
      color: var(--fg-mute);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
    }
    .btn-cancel:hover { color: var(--err); border-color: var(--err); }

    /* CONSTELLATION */
    .constellation {
      height: 140px;
      border-bottom: 1px solid var(--line);
      background: radial-gradient(circle at center, rgba(124, 58, 237, 0.06) 0%, transparent 70%);
      position: relative;
    }
    .constellation svg { width: 100%; height: 100%; display: block; }
    .star {
      fill: var(--konjo);
      filter: drop-shadow(0 0 4px var(--konjo));
    }
    .star.active {
      animation: starPulse 1.6s ease-in-out infinite;
    }
    @keyframes starPulse {
      0%, 100% { r: 4; opacity: 1; }
      50% { r: 6; opacity: 0.7; }
    }
    .link {
      stroke: var(--konjo-dim);
      stroke-width: 1;
      fill: none;
    }

    /* LOG */
    .log { grid-area: log; }
    .log-body {
      font-family: var(--mono);
      font-size: 0.74rem;
      line-height: 1.5;
      padding: 8px 12px;
    }
    .log-line {
      padding: 2px 0;
      word-break: break-word;
      white-space: pre-wrap;
      border-left: 2px solid transparent;
      padding-left: 8px;
      margin-left: -10px;
    }
    .log-line.info    { color: var(--info); }
    .log-line.warn    { color: var(--warn); border-left-color: var(--warn); }
    .log-line.error   { color: var(--err);  border-left-color: var(--err); }
    .log-line.success { color: var(--ok);   border-left-color: var(--ok); }
    .log-line.debug   { color: var(--fg-mute); }
    .log-line .ts {
      color: var(--fg-mute);
      margin-right: 6px;
    }

    /* STATS */
    .stats-bar {
      grid-area: stats;
      background: var(--bg-1);
      border-top: 1px solid var(--line);
      padding: 10px 20px;
      display: flex; gap: 24px; align-items: center;
      font-family: var(--mono);
      font-size: 0.72rem;
    }
    .stat {
      display: flex; align-items: baseline; gap: 6px;
    }
    .stat .k {
      color: var(--fg-mute);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.62rem;
    }
    .stat .v { color: var(--fg); font-weight: 600; }
    .stat .v.konjo { color: var(--konjo); }

    /* fallback notice */
    .fallback-banner {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--fg-mute);
    }
    .fallback-banner code {
      background: var(--bg-2);
      padding: 2px 6px;
      border-radius: 3px;
      color: var(--konjo);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="dot"></span> lopi <span class="tag">forge</span>
      </div>

      <form class="submit" id="submit-form" onsubmit="return false;">
        <textarea id="goal-input" placeholder="describe a goal — e.g. fix flaky test in foo::bar" rows="1"></textarea>
        <select id="priority-input">
          <option value="low">low</option>
          <option value="normal" selected>normal</option>
          <option value="high">high</option>
          <option value="critical">critical</option>
        </select>
        <button id="submit-btn" type="submit">submit</button>
      </form>

      <div class="conn" id="conn">
        <span class="led"></span>
        <span id="conn-text">connecting</span>
      </div>
    </header>

    <aside class="panel queue">
      <div class="panel-h">
        <span>task queue</span>
        <span class="count" id="task-count">0</span>
      </div>
      <div class="panel-body" id="task-list"></div>
    </aside>

    <main class="grid-area">
      <div class="grid-h">
        <span>active agents</span>
        <span id="agent-meta">0 running · constellation</span>
      </div>
      <div class="constellation"><svg id="constellation-svg" viewBox="0 0 600 140" preserveAspectRatio="xMidYMid meet"></svg></div>
      <div class="grid-body" id="agent-grid">
        <div class="grid-empty">no active agents — submit a goal above to begin</div>
      </div>
    </main>

    <aside class="panel log">
      <div class="panel-h">
        <span>activity log</span>
        <span class="count" id="log-count">0</span>
      </div>
      <div class="panel-body log-body" id="log-stream"></div>
    </aside>

    <footer class="stats-bar">
      <div class="stat"><span class="k">tasks</span><span class="v" id="stat-total">0</span></div>
      <div class="stat"><span class="k">running</span><span class="v konjo" id="stat-running">0</span></div>
      <div class="stat"><span class="k">queued</span><span class="v" id="stat-queued">0</span></div>
      <div class="stat"><span class="k">success</span><span class="v" id="stat-success">0</span></div>
      <div class="stat"><span class="k">failed</span><span class="v" id="stat-failed">0</span></div>
      <div class="stat"><span class="k">success rate</span><span class="v" id="stat-rate">—</span></div>
      <div class="stat"><span class="k">uptime</span><span class="v" id="stat-uptime">0s</span></div>
      <div class="fallback-banner">embedded fallback — full Forge: <code>cd web &amp;&amp; npm run build</code></div>
    </footer>
  </div>

  <script>
    "use strict";

    // -------- State --------
    const state = {
      tasks: new Map(),
      agents: new Map(),
      logs: [],
      stats: { running: 0, queued: 0, succeeded: 0, failed: 0, uptime_secs: 0 },
      selected: null,
      ws: null,
      backoff: 1000,
    };

    const MAX_LOGS = 500;
    const $ = (id) => document.getElementById(id);

    // -------- Rendering --------
    function renderTasks() {
      const list = $("task-list");
      list.innerHTML = "";
      const arr = Array.from(state.tasks.values()).sort((a, b) => {
        const ta = a.created_at || "";
        const tb = b.created_at || "";
        return tb.localeCompare(ta);
      });
      $("task-count").textContent = arr.length;
      for (const t of arr) {
        const row = document.createElement("div");
        row.className = "task-row" + (state.selected === t.id ? " selected" : "");
        row.onclick = () => { state.selected = t.id; renderTasks(); };
        const status = (t.status || "").toString().toLowerCase();
        const pillClass = status.includes("success") ? "success"
          : status.includes("fail") ? "failed"
          : status.includes("run") ? "running"
          : "queued";
        row.innerHTML = `
          <div class="goal"></div>
          <div class="meta">
            <span class="pill ${pillClass}">${escapeHtml(status || "queued")}</span>
            <span>${escapeHtml((t.id || "").slice(0, 8))}</span>
          </div>`;
        row.querySelector(".goal").textContent = t.goal || "(no goal)";
        list.appendChild(row);
      }
    }

    function renderAgents() {
      const grid = $("agent-grid");
      grid.innerHTML = "";
      $("agent-meta").textContent = `${state.agents.size} running · constellation`;
      if (state.agents.size === 0) {
        const empty = document.createElement("div");
        empty.className = "grid-empty";
        empty.textContent = "no active agents — submit a goal above to begin";
        grid.appendChild(empty);
        renderConstellation();
        return;
      }
      for (const a of state.agents.values()) {
        const card = document.createElement("div");
        card.className = "agent";
        const score = clamp(a.score ?? 0, 0, 1);
        card.innerHTML = `
          <div class="agent-h">
            <div class="agent-goal"></div>
            <span class="pill running">attempt ${a.attempt ?? 0}</span>
          </div>
          <div class="agent-meta">
            <span data-elapsed="${a.task_id}">${formatElapsed(a.elapsed_ms || 0)}</span>
            <span>${escapeHtml((a.task_id || "").slice(0, 8))}</span>
          </div>
          <div class="score-bar"><span style="width:${(score * 100).toFixed(1)}%"></span></div>
          <div class="agent-actions">
            <button class="btn-cancel" data-cancel="${a.task_id}">cancel</button>
          </div>`;
        card.querySelector(".agent-goal").textContent = a.goal || "(no goal)";
        card.querySelector(".btn-cancel").onclick = () => cancelTask(a.task_id);
        grid.appendChild(card);
      }
      renderConstellation();
    }

    function renderConstellation() {
      const svg = $("constellation-svg");
      const w = 600, h = 140;
      const ids = Array.from(state.agents.keys());
      const cx = w / 2, cy = h / 2;
      const r = Math.min(w, h) * 0.35;
      svg.innerHTML = "";
      if (ids.length === 0) {
        const t = svgEl("text", { x: cx, y: cy + 4, "text-anchor": "middle",
          fill: "rgba(245,245,247,0.32)", "font-family": "ui-monospace, SF Mono, monospace",
          "font-size": "10", "letter-spacing": "0.18em" });
        t.textContent = "AWAITING AGENTS";
        svg.appendChild(t);
        return;
      }
      const positions = ids.map((id, i) => {
        const angle = (i / ids.length) * Math.PI * 2 - Math.PI / 2;
        return { id, x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
      });
      // Links: connect agents sharing a branch keyword (cheap heuristic on goal prefix).
      for (let i = 0; i < positions.length; i++) {
        for (let j = i + 1; j < positions.length; j++) {
          if (sharesBranch(positions[i].id, positions[j].id)) {
            svg.appendChild(svgEl("line", {
              class: "link",
              x1: positions[i].x, y1: positions[i].y,
              x2: positions[j].x, y2: positions[j].y,
            }));
          }
        }
      }
      for (const p of positions) {
        const circle = svgEl("circle", {
          class: "star active", cx: p.x, cy: p.y, r: 4,
        });
        const title = svgEl("title", {});
        title.textContent = (state.agents.get(p.id)?.goal || p.id).slice(0, 80);
        circle.appendChild(title);
        svg.appendChild(circle);
      }
    }

    function sharesBranch(idA, idB) {
      const a = state.agents.get(idA), b = state.agents.get(idB);
      if (!a || !b) return false;
      const ka = (a.goal || "").trim().split(/\s+/).slice(0, 2).join(" ").toLowerCase();
      const kb = (b.goal || "").trim().split(/\s+/).slice(0, 2).join(" ").toLowerCase();
      return ka.length > 3 && ka === kb;
    }

    function renderLogs() {
      const stream = $("log-stream");
      // Render last MAX_LOGS lines (newest at bottom).
      const slice = state.logs.slice(-MAX_LOGS);
      stream.innerHTML = "";
      for (const l of slice) {
        const div = document.createElement("div");
        div.className = "log-line " + (l.level || "info");
        const ts = l.ts ? new Date(l.ts).toLocaleTimeString() : "";
        div.innerHTML = `<span class="ts">${escapeHtml(ts)}</span>`;
        const text = document.createTextNode(l.line);
        div.appendChild(text);
        stream.appendChild(div);
      }
      $("log-count").textContent = state.logs.length;
      stream.parentElement.scrollTop = stream.parentElement.scrollHeight;
    }

    function renderStats() {
      const s = state.stats;
      $("stat-total").textContent = s.succeeded + s.failed + s.running + s.queued;
      $("stat-running").textContent = s.running;
      $("stat-queued").textContent = s.queued;
      $("stat-success").textContent = s.succeeded;
      $("stat-failed").textContent = s.failed;
      const completed = s.succeeded + s.failed;
      $("stat-rate").textContent = completed === 0
        ? "—"
        : ((s.succeeded / completed) * 100).toFixed(0) + "%";
      $("stat-uptime").textContent = formatUptime(s.uptime_secs);
    }

    // -------- Live elapsed timer --------
    setInterval(() => {
      for (const a of state.agents.values()) {
        a.elapsed_ms = (a.elapsed_ms || 0) + 1000;
        const el = document.querySelector(`[data-elapsed="${a.task_id}"]`);
        if (el) el.textContent = formatElapsed(a.elapsed_ms);
      }
    }, 1000);

    // -------- WebSocket --------
    function connect() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      const url = `${proto}//${location.host}/ws`;
      const ws = new WebSocket(url);
      state.ws = ws;
      setConn("connecting", false);

      ws.onopen = () => {
        setConn("live", true);
        state.backoff = 1000;
      };
      ws.onclose = () => {
        setConn("offline", false);
        setTimeout(connect, state.backoff);
        state.backoff = Math.min(state.backoff * 2, 15000);
      };
      ws.onerror = () => ws.close();
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          handleMessage(msg);
        } catch (err) {
          console.warn("ws parse error", err, e.data);
        }
      };
    }

    function setConn(text, live) {
      $("conn-text").textContent = text;
      $("conn").classList.toggle("live", !!live);
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case "snapshot": {
          state.tasks.clear();
          (msg.tasks || []).forEach((t) => state.tasks.set(t.id, t));
          state.agents.clear();
          (msg.agents || []).forEach((a) => state.agents.set(a.task_id, a));
          if (msg.stats) state.stats = msg.stats;
          renderTasks(); renderAgents(); renderStats();
          break;
        }
        case "task_queued":
          state.tasks.set(taskId(msg), {
            id: taskId(msg), goal: msg.goal,
            status: "queued", created_at: new Date().toISOString(),
          });
          renderTasks();
          appendLog({ ts: Date.now(), level: "info", line: `queued: ${msg.goal}` });
          break;
        case "task_started":
          state.agents.set(taskId(msg), {
            task_id: taskId(msg),
            goal: state.tasks.get(taskId(msg))?.goal || "",
            attempt: msg.attempt || 1,
            elapsed_ms: 0, score: 0,
          });
          updateTaskStatus(taskId(msg), "running");
          appendLog({ ts: Date.now(), level: "info",
            line: `started attempt ${msg.attempt} on ${msg.branch}` });
          renderAgents(); renderTasks();
          break;
        case "status_changed":
          updateTaskStatus(taskId(msg), msg.status);
          renderTasks();
          break;
        case "log_line":
          appendLog({ ts: msg.ts, level: msg.level || "info", line: msg.line });
          break;
        case "score_updated": {
          const a = state.agents.get(taskId(msg));
          if (a) {
            a.score = clamp(msg.test_pass_rate || 0, 0, 1);
            renderAgents();
          }
          break;
        }
        case "task_completed": {
          const id = taskId(msg);
          const outcome = (typeof msg.outcome === "object" && msg.outcome)
            ? Object.keys(msg.outcome)[0]
            : String(msg.outcome || "done");
          state.agents.delete(id);
          updateTaskStatus(id, outcome);
          const lvl = outcome.toLowerCase().includes("success") ? "success" : "error";
          appendLog({ ts: Date.now(), level: lvl,
            line: `task ${id.slice(0, 8)} ${outcome} after ${msg.total_attempts} attempt(s)` });
          renderAgents(); renderTasks();
          break;
        }
        case "task_cancelled":
          state.agents.delete(taskId(msg));
          updateTaskStatus(taskId(msg), "cancelled");
          appendLog({ ts: Date.now(), level: "warn",
            line: `task ${taskId(msg).slice(0, 8)} cancelled` });
          renderAgents(); renderTasks();
          break;
        case "pool_stats":
          state.stats = {
            running: msg.running, queued: msg.queued,
            succeeded: msg.succeeded, failed: msg.failed,
            uptime_secs: msg.uptime_secs,
          };
          renderStats();
          break;
        case "turn_metrics": {
          const a = state.agents.get(taskId(msg));
          if (a) {
            a.score = clamp(msg.activity || 0, 0, 1);
            renderAgents();
          }
          break;
        }
        default: break;
      }
    }

    function taskId(msg) {
      const id = msg.task_id;
      if (typeof id === "string") return id;
      if (id && typeof id === "object" && "0" in id) return String(id["0"]);
      return String(id);
    }

    function updateTaskStatus(id, status) {
      const t = state.tasks.get(id);
      if (t) {
        t.status = typeof status === "string" ? status : Object.keys(status || {})[0] || "unknown";
      }
    }

    function appendLog(line) {
      state.logs.push(line);
      if (state.logs.length > MAX_LOGS * 2) {
        state.logs.splice(0, state.logs.length - MAX_LOGS);
      }
      renderLogs();
    }

    // -------- API actions --------
    async function submitTask() {
      const goal = $("goal-input").value.trim();
      const priority = $("priority-input").value;
      if (!goal) return;
      const btn = $("submit-btn");
      btn.disabled = true;
      try {
        const resp = await fetch("/api/tasks", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ goal, priority }),
        });
        if (!resp.ok) {
          const body = await resp.text();
          appendLog({ ts: Date.now(), level: "error",
            line: `submit failed (${resp.status}): ${body}` });
        } else {
          $("goal-input").value = "";
          appendLog({ ts: Date.now(), level: "success", line: `submitted: ${goal}` });
        }
      } catch (e) {
        appendLog({ ts: Date.now(), level: "error", line: `submit error: ${e}` });
      } finally {
        btn.disabled = false;
      }
    }

    async function cancelTask(id) {
      try {
        const resp = await fetch(`/api/tasks/${encodeURIComponent(id)}`, { method: "DELETE" });
        if (!resp.ok) {
          appendLog({ ts: Date.now(), level: "error",
            line: `cancel failed (${resp.status}) for ${id.slice(0, 8)}` });
        }
      } catch (e) {
        appendLog({ ts: Date.now(), level: "error", line: `cancel error: ${e}` });
      }
    }

    // -------- Helpers --------
    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }
    function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, Number(n) || 0)); }
    function formatElapsed(ms) {
      const s = Math.floor(ms / 1000);
      if (s < 60) return `${s}s`;
      const m = Math.floor(s / 60);
      if (m < 60) return `${m}m ${s % 60}s`;
      return `${Math.floor(m / 60)}h ${m % 60}m`;
    }
    function formatUptime(secs) {
      if (!secs) return "0s";
      if (secs < 60) return `${secs}s`;
      const m = Math.floor(secs / 60);
      if (m < 60) return `${m}m`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ${m % 60}m`;
      return `${Math.floor(h / 24)}d ${h % 24}h`;
    }
    function svgEl(name, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }

    // -------- Boot --------
    $("submit-btn").addEventListener("click", submitTask);
    $("goal-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
        e.preventDefault(); submitTask();
      }
    });

    // Initial fetch in case WS is slow.
    fetch("/api/stats").then(r => r.ok ? r.json() : null).then((s) => {
      if (s) { state.stats = s; renderStats(); }
    }).catch(() => {});

    fetch("/api/tasks").then(r => r.ok ? r.json() : null).then((d) => {
      if (d && d.tasks) {
        d.tasks.forEach((t) => state.tasks.set(t.id, t));
        renderTasks();
      }
    }).catch(() => {});

    fetch("/api/agents").then(r => r.ok ? r.json() : null).then((d) => {
      if (d && d.agents) {
        d.agents.forEach((a) => state.agents.set(a.task_id, a));
        renderAgents();
      }
    }).catch(() => {});

    renderTasks(); renderAgents(); renderStats(); renderLogs();
    connect();
  </script>
</body>
</html>
