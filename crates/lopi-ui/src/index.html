<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⛵ lopi</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a40;
    --purple: #7c3aed;
    --purple-dim: #4c1d95;
    --purple-glow: #a855f7;
    --cyan: #22d3ee;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #334155;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 8px;
    --radius-sm: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── nav ── */
  nav {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .wordmark {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--purple-glow);
    letter-spacing: -0.5px;
  }
  .wordmark span { color: var(--text-dim); font-size: 13px; margin-left: 8px; }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .conn-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    border: 1px solid;
    transition: all 0.3s;
  }
  .conn-pill.live { color: var(--green); border-color: #166534; background: #052e16; }
  .conn-pill.reconnecting { color: var(--yellow); border-color: #713f12; background: #1c0a00; }
  .conn-pill.offline { color: var(--red); border-color: #7f1d1d; background: #1c0101; }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .conn-dot.pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .uptime { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }

  /* ── stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 4px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--purple-dim); }
  .stat-value {
    font-size: 28px; font-weight: 700;
    font-family: var(--font-mono);
    line-height: 1;
  }
  .stat-label { font-size: 12px; color: var(--text-dim); }
  .stat-running .stat-value { color: var(--cyan); }
  .stat-queued .stat-value { color: var(--yellow); }
  .stat-done .stat-value { color: var(--green); }
  .stat-failed .stat-value { color: var(--red); }

  /* ── main layout ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: calc(100vh - 140px);
  }
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ── agent grid ── */
  .agent-section {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px; font-weight: 600;
    color: var(--text-dim);
  }
  .section-header .count {
    background: var(--purple-dim);
    color: var(--purple-glow);
    font-size: 11px; font-weight: 700;
    padding: 1px 7px; border-radius: 20px;
  }
  .agent-grid {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: grid; gap: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .agent-card:hover { border-color: var(--purple-dim); }
  .agent-card.running { border-left: 3px solid var(--cyan); }
  .agent-card.done { border-left: 3px solid var(--green); }
  .agent-card.failed { border-left: 3px solid var(--red); }
  .agent-card.queued { border-left: 3px solid var(--yellow); }
  .agent-card.retrying { border-left: 3px solid var(--yellow); }
  .card-top { display: flex; align-items: flex-start; gap: 10px; }
  .card-goal {
    flex: 1; font-size: 13px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .cancel-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: var(--radius-sm);
    padding: 3px 8px; font-size: 11px; cursor: pointer;
    transition: all 0.15s;
    display: none;
  }
  .agent-card:hover .cancel-btn { display: block; }
  .cancel-btn:hover { border-color: var(--red); color: var(--red); }
  .card-meta {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
  }
  .status-badge {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    white-space: nowrap;
  }
  .badge-running { background: #083344; color: var(--cyan); }
  .badge-queued { background: #1c1700; color: var(--yellow); }
  .badge-done { background: #052e16; color: var(--green); }
  .badge-failed { background: #1c0101; color: var(--red); }
  .badge-retrying { background: #1c1300; color: var(--yellow); }
  .badge-planning { background: #0d1a2e; color: #60a5fa; }
  .score-bar-wrap { flex: 1; min-width: 80px; }
  .score-bar-bg {
    background: var(--border); border-radius: 4px; height: 5px; overflow: hidden;
  }
  .score-bar-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--purple), var(--purple-glow));
    transition: width 0.5s ease;
  }
  .score-label { font-size: 10px; color: var(--text-dim); margin-bottom: 3px; }
  .branch-label {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--purple-dim); background: #1a0a40;
    padding: 2px 6px; border-radius: var(--radius-sm);
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* empty state */
  .empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--text-dim);
  }
  .empty-icon { font-size: 48px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .empty-sub { font-size: 13px; max-width: 260px; text-align: center; }

  /* ── sidebar ── */
  .sidebar {
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* submit panel */
  .submit-panel {
    border-bottom: 1px solid var(--border);
    padding: 16px;
    background: var(--surface);
  }
  .panel-title { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .form-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  textarea, input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    font-family: var(--font-sans);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    resize: vertical;
  }
  textarea:focus, input:focus, select:focus { border-color: var(--purple); }
  textarea { min-height: 70px; max-height: 140px; }
  select option { background: var(--surface2); }
  .launch-btn {
    width: 100%; padding: 10px;
    background: var(--purple);
    border: none; border-radius: var(--radius-sm);
    color: white; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .launch-btn:hover { background: var(--purple-glow); }
  .launch-btn:active { transform: scale(0.98); }
  .launch-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* log stream */
  .log-panel {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .log-body {
    flex: 1; overflow-y: auto;
    padding: 8px 12px;
    font-family: var(--font-mono); font-size: 11px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .log-entry { display: flex; gap: 8px; line-height: 1.4; }
  .log-ts { color: var(--text-muted); flex-shrink: 0; }
  .log-id { color: var(--purple-dim); flex-shrink: 0; font-size: 10px; }
  .log-msg { word-break: break-word; }
  .log-info { color: var(--text-dim); }
  .log-warn { color: var(--yellow); }
  .log-error { color: var(--red); }

  /* scrollbars */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--purple);
    color: var(--text); padding: 10px 18px; border-radius: var(--radius);
    font-size: 13px; z-index: 999; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<nav>
  <div class="wordmark">⛵ lopi <span>Konjo agent orchestrator</span></div>
  <div class="nav-right">
    <div class="conn-pill offline" id="conn-pill">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">Connecting…</span>
    </div>
    <div class="uptime" id="uptime-el">0s</div>
  </div>
</nav>

<div class="stats-bar">
  <div class="stat-card stat-running">
    <div class="stat-value" id="stat-running">0</div>
    <div class="stat-label">🔵 Running</div>
  </div>
  <div class="stat-card stat-queued">
    <div class="stat-value" id="stat-queued">0</div>
    <div class="stat-label">⏳ Queued</div>
  </div>
  <div class="stat-card stat-done">
    <div class="stat-value" id="stat-done">0</div>
    <div class="stat-label">✅ Done</div>
  </div>
  <div class="stat-card stat-failed">
    <div class="stat-value" id="stat-failed">0</div>
    <div class="stat-label">❌ Failed</div>
  </div>
</div>

<div class="main">
  <div class="agent-section">
    <div class="section-header">
      Agents
      <span class="count" id="agent-count">0</span>
    </div>
    <div class="agent-grid" id="agent-grid">
      <div class="empty" id="empty-state">
        <div class="empty-icon">⛵</div>
        <div class="empty-title">No tasks yet</div>
        <div class="empty-sub">Submit a task in the panel on the right to start a lopi agent.</div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="submit-panel">
      <div class="panel-title">🚢 Launch Task</div>
      <div class="form-group">
        <div class="form-label">Goal</div>
        <textarea id="goal-input" placeholder="Describe what the agent should do…"></textarea>
      </div>
      <div class="form-group">
        <div class="form-label">Repo path (optional)</div>
        <input type="text" id="repo-input" placeholder="/path/to/repo" />
      </div>
      <div class="form-group">
        <div class="form-label">Priority</div>
        <select id="priority-select">
          <option value="normal">Normal</option>
          <option value="low">Low</option>
          <option value="high">High</option>
          <option value="critical">Critical</option>
        </select>
      </div>
      <button class="launch-btn" id="launch-btn" onclick="submitTask()">
        🚢 Launch
      </button>
    </div>

    <div class="log-panel">
      <div class="section-header">
        Live Log
      </div>
      <div class="log-body" id="log-body"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const MAX_LOG = 150;
const MAX_AGENTS_DISPLAY = 50;

let ws = null;
let agents = {}; // taskId → agent object
let logs = [];
let stats = { running: 0, queued: 0, succeeded: 0, failed: 0, uptime_secs: 0 };
let serverStartedAt = null;
let reconnectDelay = 1000;
let uptimeInterval = null;

// ── WebSocket ──────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    setConn('live');
    reconnectDelay = 1000;
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleMessage(data);
  };

  ws.onclose = () => {
    setConn('reconnecting');
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };

  ws.onerror = () => {
    setConn('offline');
  };
}

function handleMessage(data) {
  // Snapshot (full state on connect)
  if (data.type === 'snapshot') {
    for (const t of (data.tasks || [])) {
      agents[t.id] = {
        id: t.id, goal: t.goal, status: t.status,
        attempt: 0, max_retries: 3, score: 0, branch: '',
        started: Date.now(),
      };
    }
    if (data.stats) updateStats(data.stats);
    renderAll();
    return;
  }

  // AgentEvent variants
  switch (data.type) {
    case 'task_queued':
      agents[data.task_id] = {
        id: data.task_id, goal: data.goal, status: 'Queued',
        attempt: 0, max_retries: 3, score: 0, branch: '',
        started: Date.now(),
        priority: data.priority,
      };
      stats.queued = Math.max(0, stats.queued + 1);
      renderAgent(data.task_id);
      updateStatsUI();
      addLog(data.task_id, `Queued: ${data.goal}`, 'info');
      break;

    case 'task_started':
      if (agents[data.task_id]) {
        agents[data.task_id].attempt = data.attempt;
        agents[data.task_id].branch = data.branch;
        agents[data.task_id].started = Date.now();
        renderAgent(data.task_id);
      }
      addLog(data.task_id, `Started attempt ${data.attempt} on ${data.branch}`, 'info');
      break;

    case 'status_changed': {
      if (agents[data.task_id]) {
        agents[data.task_id].status = statusLabel(data.status);
        agents[data.task_id].attempt = data.attempt;
        renderAgent(data.task_id);
      }
      break;
    }

    case 'score_updated':
      if (agents[data.task_id]) {
        agents[data.task_id].score = data.test_pass_rate;
        renderAgent(data.task_id);
      }
      break;

    case 'log_line':
      addLog(data.task_id, data.line, data.level || 'info');
      break;

    case 'task_completed': {
      const label = statusLabel(data.outcome);
      if (agents[data.task_id]) {
        agents[data.task_id].status = label;
        renderAgent(data.task_id);
      }
      const isSuccess = label === 'Done';
      if (isSuccess) { stats.succeeded++; addLog(data.task_id, '✅ Task completed successfully', 'info'); }
      else { stats.failed++; addLog(data.task_id, '❌ Task failed after ' + data.total_attempts + ' attempts', 'warn'); }
      updateStatsUI();
      showToast(isSuccess ? '✅ Task complete!' : '❌ Task failed');
      break;
    }

    case 'task_cancelled':
      delete agents[data.task_id];
      document.getElementById('agent-' + data.task_id)?.remove();
      addLog(data.task_id, '⛔ Task cancelled', 'warn');
      updateAgentCount();
      updateEmptyState();
      break;

    case 'pool_stats':
      updateStats(data);
      break;
  }
}

function statusLabel(s) {
  if (!s) return 'Unknown';
  if (typeof s === 'string') return s;
  if (s.Success !== undefined || s.success !== undefined) return 'Done';
  if (s.Failed !== undefined || s.failed !== undefined) return 'Failed';
  if (s.Retrying !== undefined || s.retrying !== undefined) return 'Retrying';
  const key = Object.keys(s)[0];
  return key || 'Unknown';
}

// ── Stats ──────────────────────────────────────────────────
function updateStats(s) {
  if (s.running !== undefined) stats.running = s.running;
  if (s.queued !== undefined) stats.queued = s.queued;
  if (s.succeeded !== undefined) stats.succeeded = s.succeeded;
  if (s.failed !== undefined) stats.failed = s.failed;
  if (s.uptime_secs !== undefined) {
    serverStartedAt = Date.now() - s.uptime_secs * 1000;
  }
  updateStatsUI();
}

function updateStatsUI() {
  const running = Object.values(agents).filter(a =>
    !['Queued','Done','Failed','RolledBack'].includes(a.status)
  ).length;
  document.getElementById('stat-running').textContent = running;
  document.getElementById('stat-queued').textContent = stats.queued;
  document.getElementById('stat-done').textContent = stats.succeeded;
  document.getElementById('stat-failed').textContent = stats.failed;
}

// ── Uptime clock ───────────────────────────────────────────
function startUptime() {
  if (uptimeInterval) clearInterval(uptimeInterval);
  uptimeInterval = setInterval(() => {
    if (!serverStartedAt) {
      // Fallback: poll /api/stats
      fetch('/api/stats').then(r => r.json()).then(s => {
        serverStartedAt = Date.now() - s.uptime_secs * 1000;
        updateStats(s);
      }).catch(() => {});
      return;
    }
    const s = Math.floor((Date.now() - serverStartedAt) / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    let label = h > 0 ? `${h}h ${m}m` : m > 0 ? `${m}m ${sec}s` : `${sec}s`;
    document.getElementById('uptime-el').textContent = label;
    // Tick elapsed on agent cards
    Object.values(agents).forEach(a => {
      const el = document.getElementById(`elapsed-${a.id}`);
      if (el && a.started) {
        const es = Math.floor((Date.now() - a.started) / 1000);
        el.textContent = es < 60 ? `${es}s` : `${Math.floor(es/60)}m${es%60}s`;
      }
    });
  }, 1000);
}

// ── Render ─────────────────────────────────────────────────
function renderAll() {
  Object.keys(agents).forEach(id => renderAgent(id));
  updateAgentCount();
  updateEmptyState();
  updateStatsUI();
}

function renderAgent(id) {
  const a = agents[id];
  if (!a) return;
  const existing = document.getElementById('agent-' + id);
  const el = existing || document.createElement('div');
  if (!existing) {
    el.id = 'agent-' + id;
    el.className = 'agent-card';
    document.getElementById('agent-grid').appendChild(el);
    document.getElementById('empty-state').style.display = 'none';
    updateAgentCount();
  }

  const statusClass = agentStatusClass(a.status);
  el.className = `agent-card ${statusClass}`;

  const pct = Math.round((a.score || 0) * 100);
  const idShort = id.substring(0, 8);
  const goal = a.goal.length > 80 ? a.goal.substring(0, 79) + '…' : a.goal;
  const branch = a.branch ? a.branch.split('/').slice(-1)[0] : '';

  el.innerHTML = `
    <div class="card-top">
      <div class="card-goal" title="${escHtml(a.goal)}">${escHtml(goal)}</div>
      <button class="cancel-btn" onclick="cancelTask('${id}')">✕ Cancel</button>
    </div>
    <div class="card-meta">
      <span class="status-badge ${statusBadgeClass(a.status)}">${statusIcon(a.status)} ${escHtml(a.status)}</span>
      <span>Attempt ${a.attempt || 0}/${a.max_retries || 3}</span>
      ${branch ? `<span class="branch-label" title="${escHtml(a.branch)}">⎇ ${escHtml(branch)}</span>` : ''}
      <span id="elapsed-${id}" style="margin-left:auto;color:var(--text-muted)">-</span>
    </div>
    <div>
      <div class="score-label">Test pass rate: ${pct}%</div>
      <div class="score-bar-bg">
        <div class="score-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>
  `;
}

function agentStatusClass(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l === 'queued') return 'queued';
  if (l === 'done' || l === 'success') return 'done';
  if (l === 'failed' || l === 'rolledback' || l === 'rolled_back') return 'failed';
  if (l === 'retrying') return 'retrying';
  return 'running';
}

function statusBadgeClass(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l === 'queued') return 'badge-queued';
  if (l === 'done' || l === 'success') return 'badge-done';
  if (l === 'failed' || l === 'rolledback') return 'badge-failed';
  if (l === 'retrying') return 'badge-retrying';
  if (l === 'planning') return 'badge-planning';
  return 'badge-running';
}

function statusIcon(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l === 'queued') return '⏳';
  if (l === 'planning') return '📋';
  if (l === 'implementing') return '🔨';
  if (l === 'testing') return '🧪';
  if (l === 'scoring') return '📊';
  if (l === 'retrying') return '♻️';
  if (l === 'done' || l === 'success') return '✅';
  if (l === 'failed') return '❌';
  if (l === 'rolledback') return '⏪';
  return '🔵';
}

function updateAgentCount() {
  document.getElementById('agent-count').textContent = Object.keys(agents).length;
}

function updateEmptyState() {
  const empty = document.getElementById('empty-state');
  if (empty) empty.style.display = Object.keys(agents).length === 0 ? 'flex' : 'none';
}

// ── Logs ───────────────────────────────────────────────────
function addLog(taskId, line, level) {
  const now = new Date();
  const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
  const idShort = taskId ? taskId.substring(0, 6) : 'system';
  const levelClass = `log-${level || 'info'}`;

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <span class="log-ts">${ts}</span>
    <span class="log-id">${idShort}</span>
    <span class="log-msg ${levelClass}">${escHtml(line)}</span>
  `;

  const body = document.getElementById('log-body');
  body.appendChild(entry);
  logs.push(entry);
  if (logs.length > MAX_LOG) {
    body.removeChild(logs.shift());
  }
  // Auto-scroll if near bottom.
  const atBottom = body.scrollHeight - body.scrollTop < body.clientHeight + 60;
  if (atBottom) body.scrollTop = body.scrollHeight;
}

// ── Actions ────────────────────────────────────────────────
async function submitTask() {
  const goal = document.getElementById('goal-input').value.trim();
  if (!goal) { showToast('⚠️ Please enter a goal'); return; }

  const btn = document.getElementById('launch-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Launching…';

  const repo = document.getElementById('repo-input').value.trim();
  const priority = document.getElementById('priority-select').value;

  try {
    const res = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal, repo: repo || undefined, priority }),
    });
    const data = await res.json();
    if (data.duplicate_of) {
      showToast(`⚠️ Duplicate — already queued as ${data.duplicate_of.substring(0,8)}`);
    } else {
      showToast(`🚢 Task ${data.id.substring(0,8)} launched!`);
      document.getElementById('goal-input').value = '';
    }
  } catch (e) {
    showToast('❌ Failed to submit task');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🚢 Launch';
  }
}

async function cancelTask(id) {
  if (!confirm('Cancel this task?')) return;
  try {
    const res = await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.cancelled) showToast('⛔ Task cancelled');
    else showToast('ℹ️ ' + (data.reason || 'Could not cancel'));
  } catch (e) {
    showToast('❌ Cancel failed');
  }
}

// ── Connection UI ──────────────────────────────────────────
function setConn(state) {
  const pill = document.getElementById('conn-pill');
  const dot = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  pill.className = `conn-pill ${state}`;
  if (state === 'live') {
    dot.classList.add('pulse');
    label.textContent = '● Live';
    // Re-sync stats.
    fetch('/api/stats').then(r => r.json()).then(updateStats).catch(() => {});
  } else if (state === 'reconnecting') {
    dot.classList.remove('pulse');
    label.textContent = 'Reconnecting…';
  } else {
    dot.classList.remove('pulse');
    label.textContent = '○ Offline';
  }
}

// ── Toast ──────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Utils ──────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter in goal textarea submits.
document.getElementById('goal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitTask();
});

// ── Boot ───────────────────────────────────────────────────
connect();
startUptime();
</script>
