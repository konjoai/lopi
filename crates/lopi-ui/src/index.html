<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>lopi 🚢</title>
<style>
  body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #0b0d10; color: #d6deeb; margin: 0; padding: 2rem; }
  h1 { color: #82aaff; }
  .tag { color: #c792ea; }
  ul { list-style: none; padding: 0; }
  li { padding: .5rem 0; border-bottom: 1px solid #1d2127; }
  .status { color: #addb67; }
</style>
</head>
<body>
<h1>🚢 lopi <span class="tag">— Konjo agent orchestrator</span></h1>
<p>KONJO — Know · Outline · Nail · Justify · Optimize</p>
<h2>Tasks</h2>
<ul id="tasks"><li>Loading…</li></ul>
<script>
async function refresh() {
  const r = await fetch('/api/tasks');
  const j = await r.json();
  const ul = document.getElementById('tasks');
  ul.innerHTML = '';
  for (const t of j.tasks) {
    const li = document.createElement('li');
    li.innerHTML = `<span class="status">[${t.status}]</span> <strong>${t.id.slice(0,8)}</strong> — ${t.goal}`;
    ul.appendChild(li);
  }
  if (j.tasks.length === 0) ul.innerHTML = '<li>No tasks yet — try <code>lopi run --goal "..."</code></li>';
}
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
