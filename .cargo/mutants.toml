# cargo-mutants configuration (Konjo G3 ‚Äî Mutation Testing).
#
# Exclude untestable IO / entry-point shells from mutation testing. These
# functions carry no branching logic: they delegate to pure, unit-tested
# helpers (e.g. `replay_plan`, `resolve_restart`, `classify`) and only perform
# stdout or database IO that mutation testing cannot meaningfully assert. A
# "replace body with Ok(())" mutant on such a shell can never be killed by a
# unit test, so it would otherwise be a permanent false-positive survivor.
exclude_re = [
    ": replace main -> ",
    "replay_commands\\.rs.*: replace run -> ",
    "replay_commands\\.rs.*: replace print_plan ",
    # `lopi run` CLI entry point ‚Äî an async IO shell on a par with `main` and
    # `replay_commands::run`. It opens the store, builds the task, constructs the
    # runner (delegating to unit-tested `LoopConfig::load_from_repo`,
    # `AgentRunner::with_self_prompt` / `with_strategy_escalation` /
    # `with_adaptive_retry`), and awaits `.run().await`. No unit-testable branching
    # of its own; a "replace body with Ok(())" mutant can only be killed by a full
    # live-agent harness.
    "run_command\\.rs.*: replace run -> ",
    # `lopi sail` entry point ‚Äî the async IO shell sibling of `run_command::run`
    # and `replay_commands::run`. It opens the store (honoring the unit-tested
    # `util::expand_home` / `util::db_path` for the path), builds the pool,
    # seeds schedules, spawns the telegram/scheduler/ctrl-c tasks, and awaits
    # `serve_with_repo`. Its own status/config logic lives in unit-tested units
    # (`TaskStatus::db_status`, `expand_home`, the `AppState::with_config` +
    # `GET /api/config` handler tests); the shell only wires them together, so a
    # "replace body with Ok(())" mutant can only be killed by a live server harness.
    "sail_commands\\.rs.*: replace run -> ",
    # REPL goal-dispatch shell (`repl::dispatch_goal`) ‚Äî spawns the runner and
    # the AgentEvent‚ÜíReplEvent bridge on background tasks and persists the
    # terminal status via the unit-tested `TaskStatus::db_status`. No
    # unit-testable branching of its own; killing a "replace body with Ok(())"
    # mutant would need a live runner + TUI event loop, same as the entries above.
    "actions\\.rs.*: replace dispatch_goal -> ",
    # Phase 16.2b ‚Äî autonomy enforcement. The branching *decisions* live in pure,
    # unit-tested helpers (`pr_decision`, `requires_verifier`, `should_auto_merge`,
    # `plan_gate_applies`, `non_empty_constraint`, `pr_create_args`,
    # `pr_merge_args`, `parse_plan_steps`/`strip_numbered`). The functions below
    # are IO shells: they delegate to those helpers and only run git/gh
    # subprocesses, stream from the model, touch the DB, or emit log lines ‚Äî none
    # of which a unit test can assert against. The patterns are function-scoped
    # (no trailing `->`/`in`) so inner operator/guard mutants ‚Äî `attempt + 1`
    # arithmetic, guards on IO results ‚Äî are excluded along with the body.
    "manager\\.rs.*GitManager::create_pr\\b",
    "manager\\.rs.*GitManager::open_pr\\b",
    "manager\\.rs.*GitManager::open_draft_pr\\b",
    "manager\\.rs.*GitManager::auto_merge\\b",
    "finalize\\.rs.*AgentRunner::finalize\\b",
    "finalize\\.rs.*AgentRunner::apply_pr_decision\\b",
    "finalize\\.rs.*AgentRunner::emit_report\\b",
    "seed\\.rs.*AgentRunner::gather_seed\\b",
    "seed\\.rs.*AgentRunner::seed_from_patterns\\b",
    "speculative\\.rs.*AgentRunner::implement_speculative\\b",
    "speculative\\.rs.*AgentRunner::speculative_plan_failed\\b",
    "plan_gate\\.rs.*AgentRunner::gate_plan\\b",
    "plan_gate\\.rs.*AgentRunner::await_plan_approval\\b",
    # The top-level plan‚Üíimplement‚Üítest‚Üíscore‚Üíretry orchestration loop. Like the
    # excluded `main` / `replay_commands::run` entry points, it only sequences
    # the tested units above (gather_seed, gate_plan, finalize, ‚Ä¶) and git IO;
    # its body and the `attempt + 1` index arithmetic can't be pinned without a
    # full live-agent integration harness.
    "run_loop\\.rs.*AgentRunner::run\\b",
    # Phase 16.6 ‚Äî task-budget enforcement. The decision logic (whether a model
    # accepts a budget, clamping below the API minimum, the wire-shape value)
    # lives in pure, unit-tested helpers in `api_budget.rs`
    # (`supports_task_budget`, `effective_task_budget`, `task_budget_output_config`)
    # and the `AgentRunner::with_task_budget` builder. `stream_plan` is the
    # streaming-IO shell that only forwards those results onto an HTTP request and
    # consumes the SSE response ‚Äî no unit-testable branching a mutant could pin
    # without a live API harness.
    "api_client\\.rs.*AnthropicClient::stream_plan\\b",
]
